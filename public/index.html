<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBH Pro Forma — Silicon Bayou Holdings</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --deep-black:#130702;--pure-white:#FFFFFF;--warm-cream:#FDF4E2;
      --marsh-olive:#676C5C;--cypress-mist:#959685;--rust-brown:#866244;
      --ocher-gold:#B58A4B;--gold-light:#D7B878;--bayou-green:#4F5B45;
      --swamp-pine:#2E382B;--brick-red:#9C4F38;--iron-red:#6E3525;
      --slate-blue:#4E5E68;--sky-mist:#7D8C96;
      --pale-clay:#C9B9A6;--deep-clay:#9F8C77;
      --bg:#FDF8F0;--text:#130702;--muted:#7D8C96;--border:#C9B9A6;
      --success:#4F5B45;--warning:#B58A4B;--danger:#9C4F38
    }
    body{font-family:'Manrope',sans-serif;line-height:1.6;color:var(--text);background:var(--bg)}
    h1,h2,h3,.heading{font-family:'Barlow Semi Condensed',sans-serif}

    /* Header */
    .header{background:var(--deep-black);color:var(--warm-cream);padding:1.25rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
    .header-brand{display:flex;align-items:center;gap:0.75rem;flex-shrink:0}
    .header-logo-text{flex-shrink:0;white-space:nowrap}
    .header-sub{font-size:0.7rem;color:var(--cypress-mist);letter-spacing:0.03em;white-space:nowrap}
    .header-nav{display:flex;gap:0.35rem}
    .header-nav a{color:var(--cypress-mist);text-decoration:none;font-size:0.8rem;padding:0.4rem 0.75rem;border-radius:4px;transition:all 0.2s;font-weight:500;font-family:'Barlow Semi Condensed',sans-serif;letter-spacing:0.02em}
    .header-nav a:hover{color:var(--warm-cream);background:rgba(253,244,226,0.08)}
    .header-nav a.active{color:var(--ocher-gold);background:rgba(181,138,75,0.12)}

    .container{max-width:800px;margin:0 auto;padding:2rem}

    /* Cards */
    .card{background:var(--pure-white);border:1px solid var(--border);border-radius:8px;padding:1.5rem;margin-bottom:1.25rem}
    .card-accent{border-left:3px solid var(--ocher-gold)}
    .card-dark{background:var(--deep-black);color:var(--warm-cream);border-color:rgba(181,138,75,0.3)}
    .card-dark h2,.card-dark h3,.card-dark strong{color:var(--warm-cream)}
    .card-dark .text-muted{color:var(--cypress-mist)}

    h2{font-size:1.35rem;font-weight:600;color:var(--deep-black);margin-bottom:0.75rem;letter-spacing:-0.01em}
    h3{font-size:1rem;font-weight:600;color:var(--deep-black);margin:1rem 0 0.5rem;letter-spacing:0.01em}
    p{margin-bottom:0.5rem}
    .mono{font-family:'IBM Plex Mono',monospace;font-size:0.8rem;letter-spacing:0.02em}
    .text-muted{color:var(--muted)}
    .text-gold{color:var(--ocher-gold)}
    .text-green{color:var(--bayou-green)}
    .text-danger{color:var(--brick-red)}

    /* Inputs */
    .input{width:100%;padding:0.65rem 0.75rem;border:1px solid var(--pale-clay);border-radius:6px;font-size:0.95rem;font-family:'Manrope',sans-serif;color:var(--text);background:var(--pure-white);transition:border-color 0.2s;outline:none}
    .input:focus{border-color:var(--ocher-gold)}
    textarea.input{min-height:80px;resize:vertical}
    select.input{cursor:pointer;appearance:auto}
    .input-currency{position:relative}.input-currency span{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--muted);font-family:'IBM Plex Mono',monospace}.input-currency .input{padding-left:1.5rem}
    .input-label{display:block;font-size:0.8rem;font-weight:600;color:var(--marsh-olive);margin-bottom:0.35rem;letter-spacing:0.02em;text-transform:uppercase;font-family:'Barlow Semi Condensed',sans-serif}

    /* Buttons */
    .btn{padding:0.6rem 1.5rem;border:none;border-radius:6px;cursor:pointer;font-size:0.9rem;font-weight:600;font-family:'Barlow Semi Condensed',sans-serif;letter-spacing:0.03em;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.4rem}
    .btn-dark{background:var(--deep-black);color:var(--warm-cream)}.btn-dark:hover{background:#2a1d10}
    .btn-gold{background:var(--ocher-gold);color:var(--pure-white)}.btn-gold:hover{background:var(--rust-brown)}
    .btn-outline{background:transparent;border:1px solid var(--pale-clay);color:var(--text)}.btn-outline:hover{border-color:var(--ocher-gold);color:var(--ocher-gold)}
    .btn-sm{font-size:0.8rem;padding:0.4rem 1rem}
    .btn-danger{background:var(--brick-red);color:var(--pure-white);font-size:0.8rem;padding:0.4rem 1rem}
    .btn:disabled{opacity:0.4;cursor:not-allowed}

    /* Progress */
    .progress{height:4px;background:var(--pale-clay);border-radius:2px;overflow:hidden;margin:0.5rem 0}
    .progress-fill{height:100%;border-radius:2px;transition:width 0.4s ease}

    /* Module pills */
    .module-pills{display:flex;gap:0.35rem;flex-wrap:wrap;justify-content:center;margin:1rem 0}
    .module-pill{padding:0.3rem 0.6rem;border:1px solid var(--pale-clay);border-radius:4px;font-size:0.75rem;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all 0.2s;background:var(--pure-white)}
    .module-pill.active{border-color:var(--ocher-gold);background:rgba(181,138,75,0.06);font-weight:600;color:var(--deep-black)}
    .module-pill.complete{background:rgba(79,91,69,0.08);color:var(--bayou-green);border-color:var(--bayou-green)}

    /* Tip boxes */
    .tip{padding:0.75rem 1rem;border-radius:6px;font-size:0.85rem;margin-bottom:0.75rem;line-height:1.6}
    .tip-why{background:rgba(79,91,69,0.05);border:1px solid rgba(79,91,69,0.15)}
    .tip-affects{background:rgba(181,138,75,0.06);border:1px solid rgba(181,138,75,0.15)}
    .tip-label{font-family:'Barlow Semi Condensed',sans-serif;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--marsh-olive);display:block;margin-bottom:0.25rem;font-weight:600}

    /* Skip box */
    .skip-box{border:1px solid var(--pale-clay);border-radius:6px;padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:0.75rem;background:rgba(253,244,226,0.4)}
    .glossary-fab{position:fixed;bottom:1.5rem;right:1.5rem;width:48px;height:48px;border-radius:50%;background:var(--deep-black);color:var(--warm-cream);border:2px solid var(--ocher-gold);font-size:1.2rem;cursor:pointer;z-index:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.3);transition:transform 0.2s}
    .glossary-fab:hover{transform:scale(1.1)}
    .glossary-panel{position:fixed;bottom:4.5rem;right:1.5rem;width:380px;max-width:calc(100vw - 2rem);max-height:60vh;background:#FFFFFF;border:1px solid var(--pale-clay);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.25);z-index:901;display:flex;flex-direction:column;overflow:hidden}
    .glossary-panel.hidden{display:none}
    .glossary-header{padding:1rem 1.25rem;background:var(--deep-black);color:var(--warm-cream);display:flex;justify-content:space-between;align-items:center}
    .glossary-header h3{margin:0;font-family:'Barlow Semi Condensed',sans-serif;font-size:1rem}
    .glossary-search{padding:0.75rem 1rem;border-bottom:1px solid var(--pale-clay);background:#FFFFFF}
    .glossary-search input{width:100%;padding:0.5rem 0.75rem;border:1px solid var(--pale-clay);border-radius:6px;font-size:0.85rem;font-family:Manrope,sans-serif}
    .glossary-search input:focus{outline:none;border-color:var(--ocher-gold)}
    .glossary-list{overflow-y:auto;padding:0.5rem 0;flex:1;background:#FFFFFF}
    .glossary-item{padding:0.6rem 1.25rem;border-bottom:1px solid rgba(201,185,166,0.2)}
    .glossary-item:last-child{border-bottom:none}
    .glossary-term{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:0.9rem;color:var(--ocher-gold);margin-bottom:0.15rem}
    .glossary-def{font-size:0.8rem;color:var(--deep-black);line-height:1.45}
    .glossary-highlight{background:rgba(181,138,75,0.15);border-left:3px solid var(--ocher-gold)}
    @media(max-width:480px){.glossary-panel{width:calc(100vw - 1rem);right:0.5rem;bottom:4rem;max-height:50vh}}

    /* Metric cards */
    .metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.75rem}
    .metric{background:var(--warm-cream);border:1px solid rgba(201,185,166,0.5);border-radius:6px;padding:0.75rem;text-align:center}
    .metric-val{font-size:1.4rem;font-weight:700;font-variant-numeric:tabular-nums;font-family:'Barlow Semi Condensed',sans-serif}
    .metric-label{font-size:0.65rem;color:var(--marsh-olive);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.04em;margin-top:0.15rem}

    /* Tables */
    .tbl{width:100%;border-collapse:collapse;font-size:0.8rem;font-variant-numeric:tabular-nums}
    .tbl th{text-align:right;padding:0.5rem;font-weight:600;color:var(--deep-black);border-bottom:2px solid var(--deep-black);font-family:'Barlow Semi Condensed',sans-serif;letter-spacing:0.02em}
    .tbl th:first-child{text-align:left}
    .tbl td{text-align:right;padding:0.4rem 0.5rem;border-bottom:1px solid rgba(201,185,166,0.4)}
    .tbl td:first-child{text-align:left;font-weight:500}
    .tbl .bold td{font-weight:700}
    .tbl .negative{color:var(--brick-red)}

    /* Score ring */
    .score-ring{width:100px;height:100px;position:relative;margin:0 auto}
    .score-ring svg{transform:rotate(-90deg)}
    .score-ring .score-val{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:700;font-family:'Barlow Semi Condensed',sans-serif}

    /* Bar chart */
    .bar-chart{display:flex;align-items:flex-end;gap:0.5rem;height:160px;padding-top:1rem}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.25rem}
    .bar{width:100%;border-radius:3px 3px 0 0;transition:height 0.5s ease;min-height:2px}
    .bar-label{font-size:0.7rem;font-family:'IBM Plex Mono',monospace;color:var(--muted)}
    .bar-value{font-size:0.7rem;font-weight:600;font-family:'IBM Plex Mono',monospace}

    /* Toast */
    .toast{position:fixed;top:1rem;right:1rem;padding:0.75rem 1.25rem;border-radius:6px;color:var(--pure-white);font-weight:600;font-size:0.85rem;z-index:9999;animation:slideIn 0.3s ease}
    .toast-success{background:var(--bayou-green)}.toast-error{background:var(--brick-red)}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

    /* Footer */
    .footer{text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem;border-top:1px solid var(--pale-clay);margin-top:3rem}
    .footer strong{font-family:'Barlow Semi Condensed',sans-serif;letter-spacing:0.03em}
    .footer a{color:var(--ocher-gold);text-decoration:none;font-weight:600}

    /* Admin */
    .admin-stat{text-align:center;padding:1rem}.admin-stat-val{font-size:2.25rem;font-weight:700;color:var(--deep-black);font-family:'Barlow Semi Condensed',sans-serif}.admin-stat-label{font-size:0.7rem;color:var(--muted);margin-top:0.15rem;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.04em}
    .grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(19,7,2,0.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem}
    .modal{background:var(--pure-white);border-radius:8px;padding:2rem;max-width:700px;width:100%;max-height:90vh;overflow-y:auto}
    .hidden{display:none!important}

    /* Tagline */
    .tagline{font-family:'Manrope',sans-serif;font-style:italic;color:var(--marsh-olive);font-size:0.85rem}

    /* Print */
    @media print{.header,.footer,.btn,.no-print{display:none!important}body{background:#fff}.card{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid}@page{margin:0.75in}}
    @media(max-width:768px){.container{padding:1rem}.card{padding:1rem}.header{flex-direction:column;gap:0.5rem;text-align:center}.metric-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-brand">
      <img src="/silicon-bayou-logo.png?v=3" alt="Silicon Bayou" style="height:40px;width:auto;flex-shrink:0;">
      <div style="width:1px;height:36px;background:rgba(253,244,226,0.15);"></div>
      <span class="header-sub">AI SaaS Founder Pro Forma</span>
    </div>
    <div class="header-nav" id="nav"></div>
  </div>
  <div class="container" id="app"></div>
  <div class="footer">
    <p><strong>SILICON BAYOU HOLDINGS</strong></p>
    <p class="tagline" style="margin-top:0.25rem;">Laissez les bons temps coder!</p>
    <p style="margin-top:0.5rem;">Confidential & Proprietary · <a href="https://siliconbayou.ai" target="_blank">siliconbayou.ai</a></p>
  </div>

<script>
(function(){
  'use strict';
  var API = '';
  var app = document.getElementById('app');
  var nav = document.getElementById('nav');
  var state = { founder_id: null, email: null, name: null, company: null, responses: {}, notes: {}, page: 'start', currentModule: 1, currentQ: 0 };

  // ─── Session Persistence ───
  function saveSession() {
    if (state.founder_id) localStorage.setItem('sbh_pf_session', JSON.stringify({ founder_id: state.founder_id, email: state.email, name: state.name, company: state.company }));
  }
  function loadSession() {
    try { var s = JSON.parse(localStorage.getItem('sbh_pf_session') || 'null'); if (s && s.founder_id) { state.founder_id = s.founder_id; state.email = s.email; state.name = s.name; state.company = s.company; return true; } } catch(e) {}
    return false;
  }
  function clearSession() { localStorage.removeItem('sbh_pf_session'); state.founder_id = null; state.email = null; state.name = null; state.company = null; state.responses = {}; }

  // ─── Questions Data ──────────────────────────
  var MODULES = [
    { num:1, title:'About Your Business', desc:'The basics — what you\'re building, who it\'s for, and where you are today.', time:5, questions:[
      {q:1,label:'Company Name',plain:'What\'s your company called?',type:'text',required:true},
      {q:2,label:'Industry',plain:'What industry are you in?',why:'This determines which benchmarks and cost assumptions we use. A healthcare SaaS has different margins than a retail tech platform.',type:'select',options:['Healthcare / HealthTech','Finance / WealthTech','Real Estate / PropTech','Hospitality Tech','Retail Tech','General Software / SaaS','Education / EdTech','Legal / LegalTech','Other'],def:'General Software / SaaS',required:true},
      {q:3,label:'Customer Type',plain:'Who buys your product? Other businesses or individual consumers?',why:'Selling to small businesses vs. enterprises vs. consumers changes everything — pricing, sales cycle, support costs, and how fast you can grow.',type:'select',options:['Small businesses (under 100 employees)','Mid-size companies (100-1,000 employees)','Large enterprises (1,000+ employees)','Individual consumers','Both businesses and consumers','Government / public sector'],def:'Small businesses (under 100 employees)',required:true},
      {q:4,label:'What You Do',plain:'In plain English, what does your company do? What problem do you solve and for whom?',why:'This is the foundation of your pitch. If you can explain it simply, investors and customers will understand it.',type:'textarea',required:true,charLimit:500},
      {q:5,label:'Where Are You Today?',plain:'Which best describes where your company is right now?',why:'This changes almost everything — a company with an idea needs different projections than one with paying customers.',type:'select',options:['Just an idea — haven\'t built anything yet','Building the product — no customers yet','Have a product — looking for first customers','Have paying customers — trying to grow','Growing steadily — need to scale'],def:'Building the product — no customers yet',required:true},
      {q:6,label:'Your Team',plain:'How many people are working on this right now? (Include yourself, co-founders, employees, and regular contractors)',why:'People are your biggest expense. This number drives most of your cost projections.',type:'number',def:'2',required:true},
      {q:7,label:'Co-Founders',plain:'How many co-founders, including you?',why:'Affects founder salary projections and equity split.',type:'number',def:'2'},
      {q:8,label:'Where Are You Based?',plain:'Where is your company incorporated? (State)',why:'Affects legal costs, tax structure, and whether you qualify for Louisiana incentives.',type:'text',def:'Delaware'},
    ]},
    { num:2, title:'Money Coming In', desc:'How you make money, what you charge, and how fast you\'ll grow. This is the heart of your pro forma.', time:8, questions:[
      {q:9,label:'How You Charge',plain:'How do customers pay you?',why:'Subscription = predictable recurring revenue that investors love. One-time purchases are harder to forecast and less valuable.',type:'select',options:['Monthly subscription','Annual subscription','Pay per use (the more they use, the more they pay)','One-time purchase + ongoing support','Marketplace (you take a % of each transaction)','Mix of subscription + usage','Not sure yet — still figuring it out'],def:'Monthly subscription',required:true},
      {q:10,label:'Your Price Point',plain:'What does (or will) a typical customer pay you per month?',why:'This is the single most important number for your revenue projections. If you have multiple plans, give us the average a customer actually pays.',type:'currency',def:'$99',required:true},
      {q:11,label:'Pricing Tiers',plain:'Describe your pricing plans. (Example: Basic $29/mo, Pro $99/mo, Enterprise $299/mo)',why:'Shows how you capture different customer segments. The spread between tiers affects your average revenue per customer.',type:'textarea',def:'Basic: $29/mo, Pro: $99/mo, Enterprise: $299/mo',charLimit:300},
      {q:12,label:'Current Monthly Revenue',plain:'How much recurring revenue do you have RIGHT NOW per month? ($0 is perfectly fine — most startups start here)',why:'If $0, we\'ll build a ramp-up model based on your customer targets below. If you have revenue, we\'ll grow from there.',type:'currency',def:'$0',required:true},
      {q:13,label:'Months Until First Revenue',plain:'If you don\'t have revenue yet, how many months until your first paying customer?',why:'Everything before this is $0 revenue and pure burn. This is when your model starts generating income.',type:'number',def:'6',defSource:'Pre-Seed median'},
      {q:14,label:'First 6 Months of Customers',plain:'Once you launch, how many paying customers do you realistically expect in your first 6 months?',why:'Be honest — 5-10 is great for a new B2B product. We\'d rather have a realistic number than an optimistic guess. 15% growth on 0 customers is still 0.',type:'number',def:'5',required:true},
      {q:15,label:'Customers by End of Year 1',plain:'How many paying customers do you expect by end of Year 1?',why:'This × your price = your Year 1 revenue. Think about it: 25 customers × $99/mo = $2,475/mo = ~$30K ARR. Is that realistic for you?',type:'number',def:'25',required:true},
      {q:16,label:'Customers by End of Year 2',plain:'How about by end of Year 2?',why:'The jump from Year 1 to Year 2 tells investors whether your growth is accelerating. Going from 25 to 100 customers means you figured out how to sell.',type:'number',def:'100',required:true},
      {q:17,label:'Customer Stickiness',plain:'Once someone starts paying, how long do you think they\'ll stick around?',why:'If customers leave quickly (called "churn"), you have to spend more to replace them. Churn is the #1 killer of subscription businesses.',type:'select',options:['Less than 3 months — they try and leave quickly','3-6 months','6-12 months','1-2 years','2+ years — very sticky product'],def:'6-12 months',required:true},
      {q:18,label:'Growing Revenue from Existing Customers',plain:'Will existing customers spend more over time? (Upgrades, more seats, more usage)',why:'It costs 5-7x more to get a new customer than to grow an existing one. This is the secret to healthy SaaS economics.',type:'select',options:['Yes — they\'ll upgrade to higher plans','Yes — they\'ll add more users/seats','Yes — usage-based pricing means they pay more as they grow','Probably not — most customers stay on the same plan','Not sure yet'],def:'Yes — they\'ll upgrade to higher plans'},
      {q:19,label:'Revenue Risk',plain:'Will any single customer represent more than 20% of your revenue in Year 1?',why:'If your biggest customer leaves and they\'re 40% of revenue, that\'s a crisis. Diversified revenue is safer.',type:'select',options:['No — well diversified across many customers','Yes — 1 anchor customer expected','Yes — 2-3 large customers will dominate','Not sure yet'],def:'No — well diversified across many customers'},
    ]},
    { num:3, title:'Getting Customers', desc:'How people find you, decide to buy, and what it costs to make that happen.', time:8, questions:[
      {q:20,label:'How Customers Find You',plain:'How will people discover your product?',why:'This determines how much you need to spend on marketing and how fast you can grow. Each channel has different costs and timelines.',type:'select',options:['They can find and sign up on their own (self-serve / product-led)','We reach out to them directly (outbound sales)','Word of mouth and referrals','Content marketing and SEO (blog, videos, guides)','Paid advertising (Google, LinkedIn, Facebook)','Partnerships with other companies','A mix of several channels'],def:'A mix of several channels',required:true},
      {q:21,label:'Marketing Budget',plain:'How much will you spend on marketing per month?',why:'$0 is possible through organic/word-of-mouth but it\'s slow. $2-5K/month is typical for early startups testing channels.',type:'currency',def:'$2,000',required:true},
      {q:22,label:'Marketing Channels',plain:'Which specific channels will you invest in? (e.g., "LinkedIn ads, content/SEO, Product Hunt launch, cold outreach")',why:'Different channels have wildly different costs and timelines. Content marketing takes 6+ months to pay off; paid ads are immediate but expensive.',type:'textarea',def:'Content/SEO, LinkedIn, Product Hunt launch',charLimit:400},
      {q:23,label:'Sales Approach',plain:'How will you handle sales?',why:'Founder-led sales works for the first 10-20 customers. After that, you need dedicated salespeople — and each one costs $80-120K/year loaded.',type:'select',options:['Founders will sell — no dedicated salespeople needed','Founders sell first, hire a salesperson within 6 months','Building a sales team from day one','No sales team needed — customers sign up on their own','Using an outside agency or partner to sell'],def:'Founders sell first, hire a salesperson within 6 months',required:true},
      {q:24,label:'Time to Close a Deal',plain:'From first conversation to signed deal, how long does it take?',why:'If it takes 90 days to close a deal, your revenue is delayed 3 months from when you spend on marketing. This creates cash flow gaps you need to plan for.',type:'select',options:['Same day — they sign up online','1-2 weeks','1-2 months','2-3 months','3-6 months (enterprise sales)','6+ months (very complex deals)'],def:'1-2 weeks',required:true},
      {q:25,label:'Cost to Get a Customer',plain:'If you had to guess — how much does it cost you to get ONE paying customer? (Include ads, sales time, tools, events)',why:'This is your Customer Acquisition Cost (CAC). If you spend $200 to get a customer who pays $99/month, you break even in about 2 months. That\'s good.',type:'currency',def:'$200',required:true},
      {q:26,label:'Your Ideal Customer',plain:'Describe your perfect customer: What industry? What size company? What\'s the job title of the person who buys?',why:'A specific target means focused spending. "Everyone" as your target means wasted marketing dollars.',type:'textarea',required:true,charLimit:400},
      {q:27,label:'What Makes You Different',plain:'Why would someone choose you over the alternatives? (Include competitors or the status quo of "doing nothing")',why:'If you can\'t explain this clearly in 2 sentences, neither can your customers. This affects your pricing power and win rate.',type:'textarea',required:true,charLimit:400},
      {q:28,label:'Competition',plain:'Who are your top 2-3 competitors? What do they charge? How are you better?',why:'Every business has competition — even if it\'s just "the way things are done now." Investors will ask this.',type:'textarea',def:'No direct competitors identified yet',charLimit:500},
    ]},
    { num:4, title:'Money Going Out', desc:'What it costs to run your business. This is where most founders underestimate — be thorough.', time:10, questions:[
      {q:29,label:'Current Monthly Spending',plain:'Roughly how much does your company spend per month right now? (Include everything: salaries, hosting, tools, rent)',why:'This is your "burn rate" — the speed at which you\'re spending cash. It determines how long your money will last.',type:'currency',def:'$5,000',required:true},
      {q:30,label:'Cash in the Bank',plain:'How much cash do you have available right now?',why:'Cash ÷ monthly spending = how many months you can survive. Investors call this your "runway." Under 6 months is urgent.',type:'currency',def:'$50,000',required:true},
      {q:31,label:'Founder Salaries',plain:'What annual salary are the founders currently taking? ($0 is totally normal early on)',why:'Many founders take $0 at first — but investors know that can\'t last. We need to project when this cost kicks in.',type:'currency',def:'$0',required:true},
      {q:32,label:'When Will Founders Get Paid?',plain:'When will founders start drawing a salary (or increase their current salary)?',why:'Going from $0 to $80K per founder is a huge jump in monthly burn. Pro formas that miss this look unrealistic.',type:'select',options:['Already drawing full salary','After the next funding round closes','In about 6 months','In about 12 months','Once we hit $10K+ monthly revenue','After profitability'],def:'After the next funding round closes'},
      {q:33,label:'Target Founder Salary',plain:'What salary will founders take once they start?',why:'Combined with timing, this shows investors when your real burn rate kicks in.',type:'currency',def:'$80,000'},
      {q:34,label:'People to Hire (Year 1)',plain:'How many people do you need to hire in the next 12 months?',why:'People are your biggest expense. Each full-time hire costs roughly $85-120K/year including taxes and benefits.',type:'number',def:'2',required:true},
      {q:35,label:'What Roles?',plain:'What will those hires do?',why:'Engineers cost more than ops staff. This helps us project the right salary mix.',type:'select',options:['Mostly engineers / developers','Mostly sales & marketing','Mix of engineering and business roles','Operations & customer support','Not sure yet'],def:'Mostly engineers / developers'},
      {q:36,label:'People to Hire (Year 2)',plain:'How many additional people in Year 2?',why:'Year 2 scaling usually means doubling the team. Plan for it now so the model shows realistic growth costs.',type:'number',def:'4'},
      {q:37,label:'Average Salary',plain:'What average annual salary will you pay new hires? (Base salary, before benefits)',why:'Engineers: $90-120K. Sales: $60-80K + commission. Ops: $55-75K. Give us your best average across roles.',type:'currency',def:'$85,000',required:true},
      {q:38,label:'Contractors & Freelancers',plain:'Monthly budget for contractors and freelancers?',why:'Many startups use contractors before full-time hires — a developer at $75/hr for 20 hrs/week is $6,000/month. Don\'t forget this.',type:'currency',def:'$2,000'},
      {q:39,label:'Hosting & Cloud',plain:'Monthly cloud hosting costs? (AWS, GCP, Azure, Vercel, etc.)',why:'Starts small but scales with customers. $500/mo at launch can become $5,000/mo with 100 active customers.',type:'currency',def:'$500',required:true},
      {q:40,label:'AI & API Costs',plain:'Monthly AI API costs? (OpenAI, Anthropic, Cohere, etc.)',why:'This is the #1 margin killer for AI startups. Each API call costs money — $0.01/call × 1 million calls = $10,000/month.',type:'currency',def:'$300',required:true},
      {q:41,label:'How Will Tech Costs Scale?',plain:'As you get more customers, how will your hosting + AI costs change?',why:'If costs go up 1:1 with customers, your margins never improve. Good architecture means costs grow slower than revenue.',type:'select',options:['They\'ll grow about the same rate as customers','They\'ll grow slower than customer growth (efficiency gains)','They\'ll jump in big steps (e.g., need new server tiers)','Mostly fixed — won\'t change much','Not sure'],def:'They\'ll grow slower than customer growth (efficiency gains)'},
      {q:42,label:'Software Tools',plain:'Monthly SaaS tools & subscriptions? (Slack, GitHub, Figma, CRM, analytics, etc.)',why:'$10/seat × 10 tools × 5 people = $500/month. These sneak up on you.',type:'currency',def:'$300'},
      {q:43,label:'Office / Workspace',plain:'Monthly office or co-working cost? ($0 if you work from home)',why:'Remote = $0. Co-working = $200-500/person. Office lease = major long-term commitment.',type:'currency',def:'$0'},
      {q:44,label:'Legal & Accounting (Annual)',plain:'Estimated annual legal + accounting costs?',why:'You need clean books for investors ($500-2K/mo for bookkeeper). Lawyers for contracts, IP, fundraising ($3-5K/year minimum). SOC 2 certification alone can be $5-15K.',type:'currency',def:'$12,000'},
      {q:45,label:'Insurance (Annual)',plain:'Annual business insurance? (It\'s okay if you don\'t have this yet)',why:'E&O, D&O, and cyber insurance are often required by enterprise customers and investors. Typical startup package: $2-5K/year.',type:'currency',def:'$0'},
      {q:46,label:'Hardware for New Hires',plain:'Budget per new hire for equipment? (Laptop, monitors, etc.)',why:'Plan ~$2,000-3,000 per new hire. Multiplied by your hiring plan, this adds up.',type:'currency',def:'$2,500'},
      {q:47,label:'Other Monthly Costs',plain:'Any other significant monthly costs? (Travel, events, professional services, etc.)',type:'currency',def:'$0'},
      {q:48,label:'Surprise Cost Buffer',plain:'What % buffer should we add for unexpected costs?',why:'Things always cost more than you expect. 10-15% is standard. This makes your pro forma more realistic — and investors appreciate conservative planning.',type:'number',def:'10'},
    ]},
    { num:5, title:'Funding & Goals', desc:'Where the money comes from, where it goes, and where you\'re headed.', time:7, questions:[
      {q:49,label:'Money Raised So Far',plain:'How much total money has been put into this business? (Your savings, friends & family, angel investors, grants — all of it)',why:'Shows your funding history and validates your stage.',type:'currency',def:'$0',required:true},
      {q:50,label:'How Was It Raised?',plain:'Where did that money come from?',why:'Self-funded, friends & family, angel, institutional — each tells a different story to investors.',type:'textarea',def:'No prior funding',charLimit:500},
      {q:51,label:'Looking to Raise?',plain:'Are you looking to raise money from investors?',why:'This determines whether we build fundraising projections and dilution models.',type:'select',options:['Yes — actively raising right now','Yes — planning to in the next 6-12 months','Maybe — exploring options','No — bootstrapping / self-funded','No — profitable and growing on our own revenue'],def:'Yes — planning to in the next 6-12 months',required:true},
      {q:52,label:'How Much?',plain:'If raising, how much are you looking for?',why:'This determines your runway extension, how much equity you give up, and how aggressively you can invest in growth.',type:'currency',def:'$500,000'},
      {q:53,label:'Use of Funds',plain:'If you got that money tomorrow, what are your top 3 spending priorities?',why:'Investors want to see their money going to growth drivers — not just keeping the lights on.',type:'textarea',def:'Product development, first sales hire, marketing',charLimit:400},
      {q:54,label:'How Will You Raise?',plain:'What type of fundraising instrument?',why:'Each has different implications for valuation and control. Don\'t worry if you\'re not sure — your advisor can help.',type:'select',options:['SAFE note (most common for early stage)','Convertible note','Priced equity round','Revenue-based financing','Not sure yet — need guidance','Not raising'],def:'SAFE note (most common for early stage)'},
      {q:55,label:'Your Big Goal',plain:'Where do you see this company in 3-5 years?',why:'This sets the growth trajectory in your model. A lifestyle business and a VC-backed rocket ship have very different pro formas.',type:'select',options:['$1M+ annual revenue — profitable lifestyle business','$5-10M revenue — attractive acquisition target','$50M+ revenue — going after a huge market','$100M+ revenue — IPO track','I just want to build something great and see what happens'],def:'$5-10M revenue — attractive acquisition target',required:true},
      {q:56,label:'Exit Strategy',plain:'How do you see this ending? (It\'s okay to say "no idea")',why:'Investors think about their return. M&A, IPO, or "build to last" all create different model assumptions.',type:'select',options:['Acquired by a larger company','IPO / go public','Private equity buyout','Build a profitable company and keep it','No preference — too early to say'],def:'No preference — too early to say'},
    ]},
    { num:6, title:'Final Details', desc:'A few last questions to round out your model.', time:3, questions:[
      {q:57,label:'Louisiana Operations',plain:'Does your company operate in Louisiana?',why:'Louisiana has several startup incentive programs (Digital Media Tax Credit, Angel Investor Tax Credit, etc.) that can save you real money.',type:'select',options:['Yes — currently based there','Yes — planning to operate there','No'],def:'No',required:true},
      {q:58,label:'Regulatory Requirements',plain:'Does your industry have any special regulatory or compliance requirements? (HIPAA for healthcare, SOC 2 for enterprise, etc.)',why:'Compliance certifications cost money and time. Better to budget for them now than be surprised later.',type:'textarea',def:'Standard (SOC 2)',charLimit:300},
      {q:59,label:'Anything Else',plain:'Anything else we should know that would affect your financial model?',why:'This is your catch-all — anything unique about your business that doesn\'t fit the other questions.',type:'textarea',charLimit:500},
    ]},

  var totalQuestions = MODULES.reduce(function(s,m){return s+m.questions.length;},0);

  // ─── Discovery Calculators ─────────────────
  // Probing sub-questions that help founders arrive at their actual number
  var PROBES = {
    '2_12': { // Current Monthly Revenue
      title: 'Calculate your monthly revenue',
      fields: [
        {id:'p_paying_customers',label:'How many paying customers right now?',type:'number',def:0},
        {id:'p_avg_monthly_price',label:'What do they pay per month on average? ($)',type:'currency',def:0},
      ],
      calc: function(v){return (Number(v.p_paying_customers)||0)*(Number(v.p_avg_monthly_price)||0);},
      format:'$'
    },
    '2_13': { // Months to First Revenue
      title: 'Estimate your timeline',
      fields: [
        {id:'p_product_months',label:'Months to finish MVP / first version?',type:'number',def:3},
        {id:'p_beta_months',label:'Months of beta / free pilot?',type:'number',def:2},
        {id:'p_sales_months',label:'Months to close first paying customer?',type:'number',def:1},
      ],
      calc: function(v){return (Number(v.p_product_months)||0)+(Number(v.p_beta_months)||0)+(Number(v.p_sales_months)||0);},
      suffix:' months',
      hint:'Already have revenue? Enter 0.'
    },
    '2_14': { // First 6 months customers
      title: 'Think through your first customers',
      fields: [
        {id:'p_warm_leads',label:'People/companies already interested?',type:'number',def:2},
        {id:'p_launch_converts',label:'Expected from launch (Product Hunt, etc.)?',type:'number',def:1},
        {id:'p_referral_month',label:'Referrals per month once live?',type:'number',def:0},
      ],
      calc: function(v){return (Number(v.p_warm_leads)||0)+(Number(v.p_launch_converts)||0)+(Number(v.p_referral_month)||0)*4;},
      hint:'Be honest — where will they actually come from?'
    },
    '2_15': { // Year 1 Customers
      title: 'Build your Year 1 customer funnel',
      fields: [
        {id:'p_monthly_leads',label:'Leads per month (site visits, demos)?',type:'number',def:50},
        {id:'p_convert_rate',label:'Conversion rate to paid (%)?',type:'number',def:3},
        {id:'p_months_selling',label:'Months actively selling in Year 1?',type:'number',def:8},
      ],
      calc: function(v){return Math.round((Number(v.p_monthly_leads)||50)*(Number(v.p_convert_rate)||3)/100*(Number(v.p_months_selling)||8));},
      hint:'50 leads/mo × 3% conversion × 8 months = 12 customers.'
    },
    '2_16': { // Year 2 Customers
      title: 'Project Year 2 growth',
      fields: [
        {id:'p_y1_custs',label:'Customers at end of Year 1?',type:'number',def:25},
        {id:'p_monthly_growth',label:'Monthly customer growth in Year 2 (%)?',type:'number',def:10},
        {id:'p_churn',label:'Monthly churn (%)?',type:'number',def:5},
      ],
      calc: function(v){var c=Number(v.p_y1_custs)||25;for(var i=0;i<12;i++)c=c*(1+(Number(v.p_monthly_growth)||10)/100-(Number(v.p_churn)||5)/100);return Math.round(c);},
      hint:'Growth minus churn, compounded monthly.'
    },
    '3_21': { // Marketing Budget
      title: 'Build your marketing budget',
      fields: [
        {id:'p_content',label:'Content / SEO ($)',type:'currency',def:500},
        {id:'p_paid',label:'Paid ads (Google, LinkedIn) ($)',type:'currency',def:500},
        {id:'p_events',label:'Events / sponsorships ($)',type:'currency',def:200},
        {id:'p_mktg_tools',label:'Marketing tools ($)',type:'currency',def:200},
      ],
      calc: function(v){return (Number(v.p_content)||0)+(Number(v.p_paid)||0)+(Number(v.p_events)||0)+(Number(v.p_mktg_tools)||0);},
      format:'$'
    },
    '3_25': { // Cost to get a customer
      title: 'Calculate your customer acquisition cost',
      fields: [
        {id:'p_mktg_spend_3mo',label:'Marketing + sales spend last 3 months ($)',type:'currency',def:0},
        {id:'p_new_custs_3mo',label:'New customers in those 3 months',type:'number',def:0},
      ],
      calc: function(v){var s=Number(v.p_mktg_spend_3mo)||0;var c=Number(v.p_new_custs_3mo)||1;if(s===0&&c===0)return 200;return Math.round(s/c);},
      format:'$',
      hint:'No data yet? Think about what you\'d spend to get your first 10 customers.'
    },
    '4_29': { // Monthly Spending
      title: 'Add up your monthly expenses',
      fields: [
        {id:'p_salaries',label:'Salaries + contractors ($)',type:'currency',def:0},
        {id:'p_rent',label:'Rent / co-working ($)',type:'currency',def:0},
        {id:'p_hosting',label:'Hosting + AI APIs ($)',type:'currency',def:500},
        {id:'p_tools',label:'Software tools ($)',type:'currency',def:200},
        {id:'p_marketing',label:'Marketing ($)',type:'currency',def:0},
        {id:'p_legal',label:'Legal + accounting (monthly) ($)',type:'currency',def:200},
        {id:'p_other',label:'Other ($)',type:'currency',def:0},
      ],
      calc: function(v){return (Number(v.p_salaries)||0)+(Number(v.p_rent)||0)+(Number(v.p_hosting)||0)+(Number(v.p_tools)||0)+(Number(v.p_marketing)||0)+(Number(v.p_legal)||0)+(Number(v.p_other)||0);},
      format:'$'
    },
    '4_37': { // Average Salary
      title: 'Figure out your average salary',
      fields: [
        {id:'p_eng_sal',label:'Engineering salary (avg) ($)',type:'currency',def:95000},
        {id:'p_biz_sal',label:'Sales/ops salary (avg) ($)',type:'currency',def:70000},
        {id:'p_pct_eng',label:'% of hires that are engineers',type:'number',def:60},
      ],
      calc: function(v){var e=Number(v.p_eng_sal)||95000;var b=Number(v.p_biz_sal)||70000;var pe=(Number(v.p_pct_eng)||60)/100;return Math.round(e*pe+b*(1-pe));},
      format:'$'
    },
    '4_38': { // Contractors
      title: 'Plan your contractor spend',
      fields: [
        {id:'p_dev_hrs',label:'Dev contractor hours/month',type:'number',def:0},
        {id:'p_dev_rate',label:'Dev hourly rate ($)',type:'currency',def:75},
        {id:'p_other_contract',label:'Other contractors monthly ($)',type:'currency',def:0},
      ],
      calc: function(v){return (Number(v.p_dev_hrs)||0)*(Number(v.p_dev_rate)||75)+(Number(v.p_other_contract)||0);},
      format:'$'
    },
    '4_40': { // AI & API Costs
      title: 'Estimate your AI spend',
      fields: [
        {id:'p_api_calls',label:'API calls per day',type:'number',def:100},
        {id:'p_cost_call',label:'Cost per call ($)',type:'currency',def:0.01},
        {id:'p_training',label:'Monthly fine-tuning ($)',type:'currency',def:0},
      ],
      calc: function(v){return Math.round((Number(v.p_api_calls)||0)*(Number(v.p_cost_call)||0.01)*30+(Number(v.p_training)||0));},
      format:'$',
      hint:'GPT-4: ~$0.03/call. Claude: ~$0.01/call. Costs drop as you optimize.'
    },
    '4_44': { // Legal & Accounting
      title: 'Estimate your legal + accounting costs',
      fields: [
        {id:'p_bookkeeper',label:'Monthly bookkeeper ($)',type:'currency',def:500},
        {id:'p_corporate',label:'Corporate maintenance ($)',type:'currency',def:1500},
        {id:'p_contracts',label:'Contract review ($)',type:'currency',def:2000},
        {id:'p_compliance',label:'Compliance certs (SOC 2, etc.) ($)',type:'currency',def:3000},
        {id:'p_ip',label:'IP / patents ($)',type:'currency',def:0},
      ],
      calc: function(v){return (Number(v.p_bookkeeper)||0)*12+(Number(v.p_corporate)||0)+(Number(v.p_contracts)||0)+(Number(v.p_compliance)||0)+(Number(v.p_ip)||0);},
      format:'$',
      hint:'SOC 2 alone is $5-15K. Budget more for healthcare or finance.'
    },
    '5_49': { // Money Raised So Far
      title: 'Add up everything invested',
      fields: [
        {id:'p_self',label:'Your own money ($)',type:'currency',def:0},
        {id:'p_ff',label:'Friends & family ($)',type:'currency',def:0},
        {id:'p_angel',label:'Angel investors ($)',type:'currency',def:0},
        {id:'p_grants',label:'Grants / competitions ($)',type:'currency',def:0},
        {id:'p_inst',label:'Institutional / VC ($)',type:'currency',def:0},
      ],
      calc: function(v){return (Number(v.p_self)||0)+(Number(v.p_ff)||0)+(Number(v.p_angel)||0)+(Number(v.p_grants)||0)+(Number(v.p_inst)||0);},
      format:'$'
    },
    '5_52': { // How Much to Raise
      title: 'Figure out how much to raise',
      fields: [
        {id:'p_hires',label:'People to hire (avg $85K each)',type:'number',def:2},
        {id:'p_runway_months',label:'Months of runway needed',type:'number',def:18},
        {id:'p_monthly_ops',label:'Monthly ops costs ($)',type:'currency',def:2000},
      ],
      calc: function(v){return Math.round(((Number(v.p_hires)||0)*85000+(Number(v.p_runway_months)||0)*(Number(v.p_monthly_ops)||0))/50000)*50000;},

    },
  };

  // ─── Utilities ───────────────────────────────
  function toast(msg,type){var t=document.createElement('div');t.className='toast toast-'+(type||'success');t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3500);}
  function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
  function fmt$(n,compact){n=Number(n)||0;if(compact){if(Math.abs(n)>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return'$'+n.toFixed(0);}return'$'+n.toLocaleString();}
  function fmtPct(n){return(Number(n)||0).toFixed(1)+'%';}
  function getAnswered(){return Object.keys(state.responses).filter(function(k){return state.responses[k]&&state.responses[k].trim();}).length;}

  // ─── Router ──────────────────────────────────
  function route(){
    var hash=location.hash.replace('#','')||'';
    var parts=hash.split('/');
    // Auto-load session on first route
    if(!state.founder_id) loadSession();
    // Default: returning user → home, new user → start
    if(!hash || hash==='start') {
      if(state.founder_id) { location.hash='home'; return; }
      else { renderStart(); updateNav('start'); return; }
    }
    if(parts[0]==='admin')renderAdmin();
    else if(parts[0]==='report')renderReport(parts[1]);
    else if(parts[0]==='home'&&state.founder_id)renderHome();
    else if(parts[0]==='intake'&&state.founder_id)renderIntake();
    else if(parts[0]==='dashboard'&&state.founder_id)renderDashboard();
    else if(parts[0]==='logout'){clearSession();location.hash='start';return;}
    else if(state.founder_id){renderHome();}
    else{renderStart();}
    updateNav(parts[0]);
  }
  window.addEventListener('hashchange',route);

  function updateNav(page){
    var links = state.founder_id
      ? [{id:'home',label:'🏠 Home'},{id:'intake',label:'📝 Discovery'},{id:'dashboard',label:'📊 Dashboard'}]
      : [{id:'start',label:'Start'}];
    nav.innerHTML=links.map(function(l){return'<a href="#'+l.id+'" class="'+(page===l.id?'active':'')+'">'+l.label+'</a>';}).join('')
      + (state.founder_id ? '<a href="#logout" style="margin-left:auto;opacity:0.5;font-size:0.75rem;">Sign Out</a>' : '');
  }

  // ─── Start / Registration ───────────────────
  function renderStart(){
    app.innerHTML='<div class="card card-dark" style="text-align:center;padding:2.5rem;"><h2 style="font-size:1.8rem;font-weight:300;margin-bottom:0.25rem;letter-spacing:-0.02em;">AI SaaS Founder Pro Forma</h2><p class="tagline" style="color:var(--gold-light);font-size:0.95rem;margin-bottom:0.5rem;">Laissez les bons temps coder!</p><p style="color:var(--cypress-mist);font-size:0.85rem;">Discovery, data collection & investor-ready financial model generation.</p><p class="mono" style="color:var(--pale-clay);margin-top:0.5rem;">59 questions · 6 modules · ~35 minutes · Industry benchmarks auto-fill gaps</p></div><div class="card card-accent"><h2>Get Started</h2><p class="text-muted" style="margin-bottom:1.25rem;">Enter your details to begin or resume your discovery intake.</p><div style="max-width:400px;"><label class="input-label">Full Name *</label><input type="text" id="sName" class="input" style="margin-bottom:0.75rem;"><label class="input-label">Email *</label><input type="email" id="sEmail" class="input" style="margin-bottom:0.75rem;"><label class="input-label">Company Name *</label><input type="text" id="sCompany" class="input" style="margin-bottom:1.25rem;"><button class="btn btn-dark" id="startBtn" style="width:100%;">Begin Discovery →</button><p id="startError" style="color:var(--brick-red);font-size:0.85rem;margin-top:0.75rem;"></p></div></div><div class="card"><h3 style="margin-top:0;font-family:\'Barlow Semi Condensed\',sans-serif;font-size:1.1rem;">How It Works</h3><div class="metric-grid" style="margin-top:0.75rem;"><div class="metric"><div class="metric-val text-gold">1</div><div class="metric-label">Answer Questions</div><p style="font-size:0.8rem;margin-top:0.25rem;">Guided questions with context</p></div><div class="metric"><div class="metric-val text-gold">2</div><div class="metric-label">Skip with Defaults</div><p style="font-size:0.8rem;margin-top:0.25rem;">Industry benchmarks fill the gaps</p></div><div class="metric"><div class="metric-val text-gold">3</div><div class="metric-label">Get Your Model</div><p style="font-size:0.8rem;margin-top:0.25rem;">5-year P&L, unit economics, Finance Score</p></div></div></div>';
    document.getElementById('startBtn').addEventListener('click',function(){
      var name=document.getElementById('sName').value.trim();
      var email=document.getElementById('sEmail').value.trim();
      var company=document.getElementById('sCompany').value.trim();
      if(!name||!email||!company){document.getElementById('startError').textContent='All fields required.';return;}
      this.disabled=true;this.textContent='Starting...';
      fetch(API+'/api/founders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,name:name,company_name:company})})
      .then(function(r){return r.json();}).then(function(d){
        if(d.success){state.founder_id=d.founder_id;state.email=email;state.name=name;state.company=company;
          state.responses['1_1']=company;
          state.currentModule=1;state.currentQ=1;
          saveSession();
          saveResponse('1_1',company);
          // Load existing responses
          fetch(API+'/api/responses/'+d.founder_id).then(function(r){return r.json();}).then(function(rd){
            Object.keys(rd.responses||{}).forEach(function(k){state.responses[k]=rd.responses[k].value;});
            Object.keys(rd.notes||{}).forEach(function(k){state.notes[k]=rd.notes[k];});
            // Returning user with responses → go to home; new user → intake
            if(d.existing && Object.keys(rd.responses||{}).length > 2){
              location.hash='home'; route();
            } else {
              location.hash='intake'; route();
            }
          }).catch(function(){ location.hash='intake'; route(); });
        }else{document.getElementById('startError').textContent=d.error||'Error';document.getElementById('startBtn').disabled=false;document.getElementById('startBtn').textContent='Begin Discovery →';}
      }).catch(function(e){document.getElementById('startError').textContent=e.message;document.getElementById('startBtn').disabled=false;document.getElementById('startBtn').textContent='Begin Discovery →';});
    });
    document.getElementById('sCompany').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('startBtn').click();});
  }

  function renderIntake(){
    var mod=MODULES[state.currentModule-1];
    var q=mod.questions[state.currentQ];
    var answered=getAnswered();
    var pct=Math.round(answered/totalQuestions*100);
    var key=mod.num+'_'+q.q;
    var curVal=state.responses[key]||'';

    var h='';
    h+='<div class="card" style="padding:1rem 1.25rem;"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;"><div><span class="mono text-muted">Module '+mod.num+'/'+MODULES.length+'</span><strong style="margin-left:0.5rem;font-family:\'Barlow Semi Condensed\',sans-serif;letter-spacing:0.02em;">'+esc(mod.title)+'</strong></div><div class="mono text-muted">~'+mod.time+' min · Q'+(state.currentQ+1)+'/'+mod.questions.length+'</div></div><p style="font-size:0.85rem;color:var(--muted);margin:0.5rem 0 0;">'+esc(mod.desc)+'</p></div>';

    h+='<div style="margin-bottom:0.5rem;"><div style="display:flex;justify-content:space-between;align-items:center;" class="mono text-muted"><span>'+answered+'/'+totalQuestions+' answered</span><button onclick="document.getElementById(\'glossaryFab\').click();" class="btn btn-outline btn-sm" style="font-size:0.7rem;padding:0.2rem 0.6rem;border-color:var(--ocher-gold);color:var(--ocher-gold);">📖 Terms & Definitions</button><span>'+pct+'%</span></div><div class="progress"><div class="progress-fill" style="width:'+pct+'%;background:var(--ocher-gold);"></div></div></div>';

    h+='<div class="module-pills">';
    MODULES.forEach(function(m){
      var mAns=0;m.questions.forEach(function(mq){if(state.responses[m.num+'_'+mq.q])mAns++;});
      var isCur=m.num===state.currentModule;var isDone=mAns===m.questions.length;
      h+='<div class="module-pill'+(isCur?' active':'')+(isDone?' complete':'')+'" data-mod="'+m.num+'">'+m.num+(isDone?' ✓':'')+'</div>';
    });
    h+='</div>';

    h+='<div class="card card-accent" style="padding:1.75rem;">';
    if(q.why)h+='<div class="tip tip-why"><span class="tip-label">Why we ask</span>'+esc(q.why)+'</div>';
    h+='<h2 style="font-size:1.15rem;margin-bottom:0.25rem;">'+esc(q.plain)+'</h2>';
    h+='<p class="mono text-muted" style="margin-bottom:1rem;">'+esc(q.label)+(q.required?' <span style="color:var(--brick-red);">*</span>':'')+'</p>';
    if(q.affects)h+='<div class="tip tip-affects"><span class="tip-label">What this affects</span>'+esc(q.affects)+'</div>';

    if(q.type==='select'){
      h+='<select class="input" id="qInput"><option value="">Select...</option>';
      (q.options||[]).forEach(function(o){h+='<option value="'+esc(o)+'"'+(curVal===o?' selected':'')+'>'+esc(o)+'</option>';});
      h+='</select>';
    }else if(q.type==='textarea'){
      h+='<textarea class="input" id="qInput" maxlength="'+(q.charLimit||500)+'" placeholder="'+esc(q.plain)+'">'+esc(curVal)+'</textarea>';
      if(q.charLimit)h+='<div class="mono text-muted" style="text-align:right;margin-top:0.25rem;" id="charCount">'+(curVal.length||0)+'/'+q.charLimit+'</div>';
    }else if(q.type==='currency'){
      h+='<div class="input-currency"><span>$</span><input type="text" class="input" id="qInput" value="'+esc(curVal.replace(/^\$/,''))+'" placeholder="e.g. 500,000"></div>';
    }else if(q.type==='number'){
      h+='<input type="number" class="input" id="qInput" value="'+esc(curVal)+'" placeholder="'+esc(q.def||'')+'" style="max-width:200px;">';
    }else{
      h+='<input type="text" class="input" id="qInput" value="'+esc(curVal)+'" placeholder="'+esc(q.def||'')+'">';
    }
    h+='</div>';

    // Discovery calculator probe
    var probe=PROBES[key];
    if(probe){
      h+='<div style="margin-bottom:0.75rem;"><button class="btn btn-outline btn-sm" id="probeToggle" style="width:100%;justify-content:center;gap:0.5rem;">🧮 Help me figure this out</button>';
      h+='<div id="probePanel" class="hidden" style="margin-top:0.75rem;padding:1.25rem;border:1px solid var(--pale-clay);border-radius:8px;background:rgba(253,244,226,0.3);">';
      h+='<h3 style="margin-top:0;font-size:0.95rem;color:var(--deep-black);">'+esc(probe.title)+'</h3>';
      if(probe.hint)h+='<p style="font-size:0.8rem;color:var(--marsh-olive);margin-bottom:0.75rem;font-style:italic;">'+esc(probe.hint)+'</p>';
      probe.fields.forEach(function(f){
        h+='<div style="margin-bottom:0.6rem;"><label class="input-label" style="font-size:0.7rem;">'+esc(f.label)+'</label>';
        if(f.type==='currency'){
          h+='<div class="input-currency"><span>$</span><input type="number" class="input probe-field" id="'+f.id+'" value="'+(f.def||0)+'" style="max-width:220px;"></div>';
        }else{
          h+='<input type="number" class="input probe-field" id="'+f.id+'" value="'+(f.def||0)+'" style="max-width:180px;">';
        }
        h+='</div>';
      });
      h+='<div style="display:flex;align-items:center;gap:1rem;margin-top:1rem;padding-top:0.75rem;border-top:1px solid var(--pale-clay);"><div><span class="mono text-muted" style="font-size:0.65rem;text-transform:uppercase;">Calculated Answer</span><div id="probeResult" style="font-size:1.5rem;font-weight:700;color:var(--ocher-gold);font-family:\'Barlow Semi Condensed\',sans-serif;">—</div></div><button class="btn btn-gold btn-sm" id="probeUseBtn">Use This Answer</button></div>';
      h+='</div></div>';
    }

    if(q.def){
      h+='<div class="skip-box"><div><p style="font-size:0.85rem;font-weight:500;margin:0;">Skip this question?</p><p class="mono text-muted" style="margin:0.15rem 0 0;font-size:0.75rem;">Benchmark: <strong>'+esc(q.def)+'</strong>'+(q.defSource?' — '+esc(q.defSource):'')+'</p></div><button class="btn btn-outline btn-sm" id="skipBtn">Use Default</button></div>';
    }

    if(curVal)h+='<div class="mono text-green" style="font-size:0.75rem;margin-bottom:0.75rem;">✓ Saved</div>';

    // Notes section
    var noteVal=state.notes[key]||'';
    h+='<div style="margin:0.75rem 0;">';
    h+='<button class="btn btn-outline btn-sm" id="noteToggle" style="width:100%;justify-content:center;gap:0.5rem;font-size:0.75rem;color:var(--marsh-olive);border-color:var(--pale-clay);">'+(noteVal?'📝 Edit Note':'📝 Add a Note')+(noteVal?' <span style="font-size:0.65rem;background:rgba(79,91,69,0.1);padding:0.1rem 0.4rem;border-radius:3px;margin-left:0.5rem;">has note</span>':'')+'</button>';
    h+='<div id="notePanel" class="'+(noteVal?'':'hidden')+'" style="margin-top:0.5rem;padding:0.75rem;border:1px solid var(--pale-clay);border-radius:8px;background:rgba(181,138,75,0.04);">';
    h+='<label class="input-label" style="font-size:0.7rem;color:var(--marsh-olive);">📝 Note for yourself or the SBH team</label>';
    h+='<textarea class="input" id="noteInput" maxlength="1000" rows="3" placeholder="Ideas this question sparked, uncertainties, things to discuss with SBH..." style="font-size:0.82rem;resize:vertical;">'+esc(noteVal)+'</textarea>';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.35rem;"><span class="mono text-muted" style="font-size:0.6rem;" id="noteSaveStatus">'+(noteVal?'✓ Saved':'')+'</span><span class="mono text-muted" style="font-size:0.6rem;" id="noteCharCount">'+(noteVal.length||0)+'/1000</span></div>';
    h+='</div></div>';

    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.5rem;"><button class="btn btn-outline" id="prevBtn"'+(state.currentModule===1&&state.currentQ===0?' disabled':'')+'>← Previous</button><span class="mono text-muted no-print" style="font-size:0.75rem;">Auto-saved</span><button class="btn btn-dark" id="nextBtn">'+(state.currentModule===MODULES.length&&state.currentQ===mod.questions.length-1?'Generate Model →':'Next →')+'</button></div>';

    app.innerHTML=h;

    app.querySelectorAll('.module-pill').forEach(function(pill){
      pill.addEventListener('click',function(){state.currentModule=parseInt(this.dataset.mod);state.currentQ=0;renderIntake();});
    });

    var inp=document.getElementById('qInput');
    if(inp&&q.charLimit){inp.addEventListener('input',function(){var el=document.getElementById('charCount');if(el)el.textContent=this.value.length+'/'+q.charLimit;});}

    var saveTimer=null;
    if(inp){inp.addEventListener('input',function(){
      clearTimeout(saveTimer);var val=this.value;
      saveTimer=setTimeout(function(){saveResponse(key,val);},1200);
    });
    inp.addEventListener('change',function(){clearTimeout(saveTimer);saveResponse(key,this.value);});}

    var prevBtn=document.getElementById('prevBtn');
    if(prevBtn){prevBtn.addEventListener('click',function(){
      // Save current before navigating
      if(inp&&inp.value.trim())saveResponse(key,inp.value.trim());
      if(state.currentQ>0){state.currentQ--;}else if(state.currentModule>1){state.currentModule--;state.currentQ=MODULES[state.currentModule-1].questions.length-1;}
      renderIntake();
    });}

    var nextBtn=document.getElementById('nextBtn');
    if(nextBtn){nextBtn.addEventListener('click',function(){
      var val=(inp?inp.value:'').trim();
      if(q.required&&!val&&!state.responses[key]){toast('This question is required.','error');return;}
      if(val)saveResponse(key,val);
      if(state.currentQ<mod.questions.length-1){state.currentQ++;}
      else if(state.currentModule<MODULES.length){state.currentModule++;state.currentQ=0;}
      else{generateModel();return;}
      renderIntake();
    });}

    var skipBtn=document.getElementById('skipBtn');
    if(skipBtn){skipBtn.addEventListener('click',function(){
      saveResponse(key,q.def,'skipped_default');
      if(state.currentQ<mod.questions.length-1){state.currentQ++;}
      else if(state.currentModule<MODULES.length){state.currentModule++;state.currentQ=0;}
      else{generateModel();return;}
      renderIntake();
    });}

    // Note listeners
    var noteToggle=document.getElementById('noteToggle');
    var notePanel=document.getElementById('notePanel');
    var noteInput=document.getElementById('noteInput');
    if(noteToggle&&notePanel){
      noteToggle.addEventListener('click',function(){
        if(notePanel.classList.contains('hidden')){notePanel.classList.remove('hidden');if(noteInput)noteInput.focus();}
        else{notePanel.classList.add('hidden');}
      });
    }
    if(noteInput){
      var noteSaveTimer=null;
      noteInput.addEventListener('input',function(){
        var cc=document.getElementById('noteCharCount');if(cc)cc.textContent=this.value.length+'/1000';
        clearTimeout(noteSaveTimer);
        var v=this.value;
        var statusEl=document.getElementById('noteSaveStatus');
        if(statusEl)statusEl.textContent='Saving...';
        noteSaveTimer=setTimeout(function(){
          state.notes[key]=v;
          fetch(API+'/api/notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({founder_id:state.founder_id,question_key:key,note_text:v})})
          .then(function(){if(statusEl)statusEl.textContent=v.trim()?'✓ Saved':'';})
          .catch(function(){if(statusEl)statusEl.textContent='Error saving';});
        },1000);
      });
    }

    // Probe calculator listeners
    var probeToggle=document.getElementById('probeToggle');
    if(probeToggle&&probe){
      probeToggle.addEventListener('click',function(){
        var panel=document.getElementById('probePanel');
        if(panel.classList.contains('hidden')){panel.classList.remove('hidden');this.textContent='▲ Close calculator';calcProbe();}
        else{panel.classList.add('hidden');this.textContent='🧮 Help me figure this out';}
      });
      function calcProbe(){
        var vals={};
        probe.fields.forEach(function(f){var el=document.getElementById(f.id);if(el)vals[f.id]=el.value;});
        var result=probe.calc(vals);
        var display=probe.format==='$'?'$'+Number(result).toLocaleString():result+(probe.suffix||'');
        var el=document.getElementById('probeResult');if(el)el.textContent=display;
      }
      document.querySelectorAll('.probe-field').forEach(function(pf){
        pf.addEventListener('input',calcProbe);
      });
      var probeUseBtn=document.getElementById('probeUseBtn');
      if(probeUseBtn){probeUseBtn.addEventListener('click',function(){
        var vals={};
        probe.fields.forEach(function(f){var el=document.getElementById(f.id);if(el)vals[f.id]=el.value;});
        var result=probe.calc(vals);
        var mainInput=document.getElementById('qInput');
        if(mainInput){mainInput.value=result;saveResponse(key,String(result));}
        document.getElementById('probePanel').classList.add('hidden');
        probeToggle.textContent='🧮 Help me figure this out';
        toast('Answer calculated and saved!','success');
      });}
    }

    if(inp)inp.focus();
  }

  function saveResponse(key,value,type){
    state.responses[key]=value;
    var parts=key.split('_');
    fetch(API+'/api/responses',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      founder_id:state.founder_id,module_number:parseInt(parts[0]),question_number:parseInt(parts[1]),response_value:value,response_type:type||'founder_provided'
    })}).catch(function(){});
  }

  function generateModel(){
    if(!state.founder_id){toast('Session expired — please sign in again.','error');clearSession();location.hash='start';return;}

  // ─── Glossary ──────────────────────────────
  var GLOSSARY={
    'MRR':'Monthly Recurring Revenue — the predictable income your business earns every month from subscriptions.',
    'ARR':'Annual Recurring Revenue — your MRR multiplied by 12. Shows how much you\'d earn in a year at the current rate.',
    'TAM':'Total Addressable Market — the total amount of money that could be spent on products like yours if everyone who could buy it did.',
    'SAM':'Serviceable Addressable Market — the portion of TAM that your company can realistically reach.',
    'SOM':'Serviceable Obtainable Market — the realistic share of SAM you can capture in the near term.',
    'CAC':'Customer Acquisition Cost — how much money it costs you to get one new paying customer.',
    'LTV':'Lifetime Value — the total amount of money a customer will pay you during their entire time as a customer.',
    'LTV/CAC':'Lifetime Value to Customer Acquisition Cost ratio — shows how much revenue you earn for every dollar spent acquiring a customer. 3:1 or higher is considered healthy.',
    'ACV':'Annual Contract Value — the average yearly amount a single customer pays you.',
    'ARPU':'Average Revenue Per User — total revenue divided by number of users.',
    'NRR':'Net Revenue Retention — measures whether your existing customers are spending more or less over time. Over 100% means customers are growing.',
    'Churn':'The percentage of customers who cancel or stop paying in a given period.',
    'Gross Margin':'The percentage of revenue left after subtracting the direct costs of delivering your product (like hosting, support, and AI compute).',
    'Burn Rate':'How much money your company spends per month beyond what it earns.',
    'Runway':'How many months your company can keep operating at the current spending rate before running out of money.',
    'GTM':'Go-to-Market — your strategy for reaching and selling to customers.',
    'PLG':'Product-Led Growth — a strategy where the product itself drives customer acquisition (e.g., free trials, freemium).',
    'SaaS':'Software as a Service — a business model where customers pay a recurring subscription to use your software.',
    'B2B':'Business-to-Business — selling to other companies rather than individual consumers.',
    'B2C':'Business-to-Consumer — selling directly to individual consumers.',
    'B2B2C':'Business-to-Business-to-Consumer — selling to businesses who then serve consumers with your product.',
    'SAFE':'Simple Agreement for Future Equity — a popular early-stage investment document where an investor gives money now in exchange for equity later.',
    'ESOP':'Employee Stock Option Pool — shares set aside for employees as part of their compensation.',
    'Cap Table':'Capitalization Table — a spreadsheet showing who owns what percentage of your company.',
    'P&L':'Profit & Loss statement — a financial document showing your revenue, costs, and resulting profit or loss.',
    'COGS':'Cost of Goods Sold — the direct costs of delivering your product to customers.',
    'G&A':'General & Administrative — overhead costs like rent, utilities, legal, and accounting.',
    'S&M':'Sales & Marketing — costs related to acquiring and retaining customers.',
    'R&D':'Research & Development — costs related to building and improving your product.',
    'Unit Economics':'The revenue and costs associated with a single customer. Shows whether each new customer is profitable.',
    'Payback Period':'How many months it takes for a customer\'s payments to cover the cost of acquiring them.',
    'Valuation':'What your company is worth. "Pre-money" is the value before new investment, "post-money" includes the new investment.',
    'Dilution':'The reduction in existing shareholders\' ownership percentage when new shares are issued to investors.',
    'SOC 2':'A security certification that proves your company handles customer data safely.',
    'HIPAA':'Health Insurance Portability and Accountability Act — U.S. law requiring protection of patient health data.',
    'Pre-Money':'The valuation of your company before receiving new investment.',
    'Post-Money':'The valuation of your company after receiving new investment (pre-money + investment amount).',
    'Convertible Note':'A loan that converts to equity at a future financing round, usually with a discount or valuation cap.',
    'Revenue Multiple':'A way to value a company by multiplying its annual revenue by a number (e.g., 10x revenue).',
    'Break-Even':'The point where your revenue equals your expenses — you\'re no longer losing money.',
    'EBITDA':'Earnings Before Interest, Taxes, Depreciation and Amortization — a measure of operating profitability.'
  };
  var glossaryTerms=Object.keys(GLOSSARY).sort();

  // Build glossary UI
  var glossaryEl=document.createElement('div');
  glossaryEl.innerHTML='<button class="glossary-fab" id="glossaryFab" title="Financial Terms Glossary" style="font-size:1.5rem;line-height:1;">📖</button>'
    +'<div class="glossary-panel hidden" id="glossaryPanel">'
    +'<div class="glossary-header"><h3>📖 Financial Terms Glossary</h3><button style="background:none;border:none;color:var(--warm-cream);font-size:1.2rem;cursor:pointer;" id="glossaryClose">✕</button></div>'
    +'<div class="glossary-search"><input type="text" id="glossarySearch" placeholder="Search terms..."></div>'
    +'<div class="glossary-list" id="glossaryList"></div>'
    +'</div>';
  document.body.appendChild(glossaryEl);

  function renderGlossary(filter){
    var list=document.getElementById('glossaryList');
    var f=(filter||'').toLowerCase();
    var h='';
    glossaryTerms.forEach(function(term){
      if(f&&term.toLowerCase().indexOf(f)===-1&&GLOSSARY[term].toLowerCase().indexOf(f)===-1)return;
      h+='<div class="glossary-item"><div class="glossary-term">'+esc(term)+'</div><div class="glossary-def">'+esc(GLOSSARY[term])+'</div></div>';
    });
    if(!h)h='<div style="padding:1.25rem;text-align:center;color:var(--cypress-mist);font-size:0.85rem;">No matching terms found.</div>';
    list.innerHTML=h;
  }

  document.getElementById('glossaryFab').addEventListener('click',function(){
    var panel=document.getElementById('glossaryPanel');
    if(panel.classList.contains('hidden')){
      panel.classList.remove('hidden');
      renderGlossary();
      document.getElementById('glossarySearch').focus();
    }else{panel.classList.add('hidden');}
  });
  document.getElementById('glossaryClose').addEventListener('click',function(){
    document.getElementById('glossaryPanel').classList.add('hidden');
  });
  document.getElementById('glossarySearch').addEventListener('input',function(){
    renderGlossary(this.value);
  });

  // Auto-highlight relevant terms on each question
  function highlightGlossaryTerms(){
    var panel=document.getElementById('glossaryPanel');
    if(panel.classList.contains('hidden'))return;
    // Find terms mentioned in current question
    var questionText=(document.querySelector('.card-accent h2')||{}).textContent||'';
    var items=document.querySelectorAll('.glossary-item');
    items.forEach(function(item){
      var term=item.querySelector('.glossary-term').textContent;
      if(questionText.toLowerCase().indexOf(term.toLowerCase())>-1){
        item.classList.add('glossary-highlight');
      }else{item.classList.remove('glossary-highlight');}
    });
  }

  // Hook into renderIntake to auto-highlight
  var _origRenderIntake=renderIntake;
  renderIntake=function(){_origRenderIntake();setTimeout(highlightGlossaryTerms,100);};

  // On startup: restore session and validate it still exists in the DB
  if(loadSession() && state.founder_id){
    fetch(API+'/api/responses/'+state.founder_id).then(function(r){
      if(!r.ok){ clearSession(); route(); return Promise.reject('invalid'); }
      return r.json();
    }).then(function(rd){
      if(!rd || !rd.responses){ clearSession(); route(); return; }
      Object.keys(rd.responses||{}).forEach(function(k){state.responses[k]=rd.responses[k].value;});
      Object.keys(rd.notes||{}).forEach(function(k){state.notes[k]=rd.notes[k];});
      route();
    }).catch(function(e){ if(e!=='invalid'){ clearSession(); route(); } });
  } else {
    route();
  }
})();
</script>
</body>
