<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBH Pro Forma — Silicon Bayou Holdings</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --deep-black:#130702;--pure-white:#FFFFFF;--warm-cream:#FDF4E2;
      --marsh-olive:#676C5C;--cypress-mist:#959685;--rust-brown:#866244;
      --ocher-gold:#B58A4B;--gold-light:#D7B878;--bayou-green:#4F5B45;
      --swamp-pine:#2E382B;--brick-red:#9C4F38;--iron-red:#6E3525;
      --slate-blue:#4E5E68;--sky-mist:#7D8C96;
      --pale-clay:#C9B9A6;--deep-clay:#9F8C77;
      --bg:#FDF8F0;--text:#130702;--muted:#7D8C96;--border:#C9B9A6;
      --success:#4F5B45;--warning:#B58A4B;--danger:#9C4F38
    }
    body{font-family:'Manrope',sans-serif;line-height:1.6;color:var(--text);background:var(--bg)}
    h1,h2,h3,.heading{font-family:'Barlow Semi Condensed',sans-serif}

    /* Header */
    .header{background:var(--deep-black);color:var(--warm-cream);padding:1.25rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
    .header-brand{display:flex;align-items:center;gap:0.75rem;flex-shrink:0}
    .header-logo-text{flex-shrink:0;white-space:nowrap}
    .header-sub{font-size:0.7rem;color:var(--cypress-mist);letter-spacing:0.03em;white-space:nowrap}
    .header-nav{display:flex;gap:0.35rem}
    .header-nav a{color:var(--cypress-mist);text-decoration:none;font-size:0.8rem;padding:0.4rem 0.75rem;border-radius:4px;transition:all 0.2s;font-weight:500;font-family:'Barlow Semi Condensed',sans-serif;letter-spacing:0.02em}
    .header-nav a:hover{color:var(--warm-cream);background:rgba(253,244,226,0.08)}
    .header-nav a.active{color:var(--ocher-gold);background:rgba(181,138,75,0.12)}

    .container{max-width:800px;margin:0 auto;padding:2rem}

    /* Cards */
    .card{background:var(--pure-white);border:1px solid var(--border);border-radius:8px;padding:1.5rem;margin-bottom:1.25rem}
    .card-accent{border-left:3px solid var(--ocher-gold)}
    .card-dark{background:var(--deep-black);color:var(--warm-cream);border-color:rgba(181,138,75,0.3)}
    .card-dark h2,.card-dark h3,.card-dark strong{color:var(--warm-cream)}
    .card-dark .text-muted{color:var(--cypress-mist)}

    h2{font-size:1.35rem;font-weight:600;color:var(--deep-black);margin-bottom:0.75rem;letter-spacing:-0.01em}
    h3{font-size:1rem;font-weight:600;color:var(--deep-black);margin:1rem 0 0.5rem;letter-spacing:0.01em}
    p{margin-bottom:0.5rem}
    .mono{font-family:'IBM Plex Mono',monospace;font-size:0.8rem;letter-spacing:0.02em}
    .text-muted{color:var(--muted)}
    .text-gold{color:var(--ocher-gold)}
    .text-green{color:var(--bayou-green)}
    .text-danger{color:var(--brick-red)}

    /* Inputs */
    .input{width:100%;padding:0.65rem 0.75rem;border:1px solid var(--pale-clay);border-radius:6px;font-size:0.95rem;font-family:'Manrope',sans-serif;color:var(--text);background:var(--pure-white);transition:border-color 0.2s;outline:none}
    .input:focus{border-color:var(--ocher-gold)}
    textarea.input{min-height:80px;resize:vertical}
    select.input{cursor:pointer;appearance:auto}
    .input-currency{position:relative}.input-currency span{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--muted);font-family:'IBM Plex Mono',monospace}.input-currency .input{padding-left:1.5rem}
    .input-label{display:block;font-size:0.8rem;font-weight:600;color:var(--marsh-olive);margin-bottom:0.35rem;letter-spacing:0.02em;text-transform:uppercase;font-family:'Barlow Semi Condensed',sans-serif}

    /* Buttons */
    .btn{padding:0.6rem 1.5rem;border:none;border-radius:6px;cursor:pointer;font-size:0.9rem;font-weight:600;font-family:'Barlow Semi Condensed',sans-serif;letter-spacing:0.03em;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.4rem}
    .btn-dark{background:var(--deep-black);color:var(--warm-cream)}.btn-dark:hover{background:#2a1d10}
    .btn-gold{background:var(--ocher-gold);color:var(--pure-white)}.btn-gold:hover{background:var(--rust-brown)}
    .btn-outline{background:transparent;border:1px solid var(--pale-clay);color:var(--text)}.btn-outline:hover{border-color:var(--ocher-gold);color:var(--ocher-gold)}
    .btn-sm{font-size:0.8rem;padding:0.4rem 1rem}
    .btn-danger{background:var(--brick-red);color:var(--pure-white);font-size:0.8rem;padding:0.4rem 1rem}
    .btn:disabled{opacity:0.4;cursor:not-allowed}

    /* Progress */
    .progress{height:4px;background:var(--pale-clay);border-radius:2px;overflow:hidden;margin:0.5rem 0}
    .progress-fill{height:100%;border-radius:2px;transition:width 0.4s ease}

    /* Module pills */
    .module-pills{display:flex;gap:0.35rem;flex-wrap:wrap;justify-content:center;margin:1rem 0}
    .module-pill{padding:0.3rem 0.6rem;border:1px solid var(--pale-clay);border-radius:4px;font-size:0.75rem;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all 0.2s;background:var(--pure-white)}
    .module-pill.active{border-color:var(--ocher-gold);background:rgba(181,138,75,0.06);font-weight:600;color:var(--deep-black)}
    .module-pill.complete{background:rgba(79,91,69,0.08);color:var(--bayou-green);border-color:var(--bayou-green)}

    /* Tip boxes */
    .tip{padding:0.75rem 1rem;border-radius:6px;font-size:0.85rem;margin-bottom:0.75rem;line-height:1.6}
    .tip-why{background:rgba(79,91,69,0.05);border:1px solid rgba(79,91,69,0.15)}
    .tip-affects{background:rgba(181,138,75,0.06);border:1px solid rgba(181,138,75,0.15)}
    .tip-label{font-family:'Barlow Semi Condensed',sans-serif;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--marsh-olive);display:block;margin-bottom:0.25rem;font-weight:600}

    /* Skip box */
    .skip-box{border:1px solid var(--pale-clay);border-radius:6px;padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:0.75rem;background:rgba(253,244,226,0.4)}

    /* Metric cards */
    .metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.75rem}
    .metric{background:var(--warm-cream);border:1px solid rgba(201,185,166,0.5);border-radius:6px;padding:0.75rem;text-align:center}
    .metric-val{font-size:1.4rem;font-weight:700;font-variant-numeric:tabular-nums;font-family:'Barlow Semi Condensed',sans-serif}
    .metric-label{font-size:0.65rem;color:var(--marsh-olive);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.04em;margin-top:0.15rem}

    /* Tables */
    .tbl{width:100%;border-collapse:collapse;font-size:0.8rem;font-variant-numeric:tabular-nums}
    .tbl th{text-align:right;padding:0.5rem;font-weight:600;color:var(--deep-black);border-bottom:2px solid var(--deep-black);font-family:'Barlow Semi Condensed',sans-serif;letter-spacing:0.02em}
    .tbl th:first-child{text-align:left}
    .tbl td{text-align:right;padding:0.4rem 0.5rem;border-bottom:1px solid rgba(201,185,166,0.4)}
    .tbl td:first-child{text-align:left;font-weight:500}
    .tbl .bold td{font-weight:700}
    .tbl .negative{color:var(--brick-red)}

    /* Score ring */
    .score-ring{width:100px;height:100px;position:relative;margin:0 auto}
    .score-ring svg{transform:rotate(-90deg)}
    .score-ring .score-val{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:700;font-family:'Barlow Semi Condensed',sans-serif}

    /* Bar chart */
    .bar-chart{display:flex;align-items:flex-end;gap:0.5rem;height:160px;padding-top:1rem}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.25rem}
    .bar{width:100%;border-radius:3px 3px 0 0;transition:height 0.5s ease;min-height:2px}
    .bar-label{font-size:0.7rem;font-family:'IBM Plex Mono',monospace;color:var(--muted)}
    .bar-value{font-size:0.7rem;font-weight:600;font-family:'IBM Plex Mono',monospace}

    /* Toast */
    .toast{position:fixed;top:1rem;right:1rem;padding:0.75rem 1.25rem;border-radius:6px;color:var(--pure-white);font-weight:600;font-size:0.85rem;z-index:9999;animation:slideIn 0.3s ease}
    .toast-success{background:var(--bayou-green)}.toast-error{background:var(--brick-red)}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

    /* Footer */
    .footer{text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem;border-top:1px solid var(--pale-clay);margin-top:3rem}
    .footer strong{font-family:'Barlow Semi Condensed',sans-serif;letter-spacing:0.03em}
    .footer a{color:var(--ocher-gold);text-decoration:none;font-weight:600}

    /* Admin */
    .admin-stat{text-align:center;padding:1rem}.admin-stat-val{font-size:2.25rem;font-weight:700;color:var(--deep-black);font-family:'Barlow Semi Condensed',sans-serif}.admin-stat-label{font-size:0.7rem;color:var(--muted);margin-top:0.15rem;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.04em}
    .grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(19,7,2,0.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem}
    .modal{background:var(--pure-white);border-radius:8px;padding:2rem;max-width:700px;width:100%;max-height:90vh;overflow-y:auto}
    .hidden{display:none!important}

    /* Tagline */
    .tagline{font-family:'Manrope',sans-serif;font-style:italic;color:var(--marsh-olive);font-size:0.85rem}

    /* Print */
    @media print{.header,.footer,.btn,.no-print{display:none!important}body{background:#fff}.card{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid}@page{margin:0.75in}}
    @media(max-width:768px){.container{padding:1rem}.card{padding:1rem}.header{flex-direction:column;gap:0.5rem;text-align:center}.metric-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>

    <div class="header-brand">
      <img src="/silicon-bayou-logo.png" alt="Silicon Bayou" style="height:50px;width:auto;flex-shrink:0;">

  <div class="footer">

    <p class="tagline" style="margin-top:0.25rem;">Laissez les bons temps coder!</p>

  </div>

<script>
(function(){
  'use strict';
  var API = '';
  var app = document.getElementById('app');
  var nav = document.getElementById('nav');
  var state = { founder_id: null, email: null, responses: {}, page: 'start', currentModule: 1, currentQ: 0 };

  // ─── Questions Data ──────────────────────────
  var MODULES = [
    { num:1, title:'Company Fundamentals', desc:'Tell us about your company, team, and current stage.', time:8, questions:[
      {q:1,label:'Company Name',plain:'What is your company called?',why:'Used throughout your financial model and investment memos.',affects:'All deliverable headers.',type:'text',required:true},
      {q:2,label:'Industry / Vertical',plain:'What industry does your company operate in?',why:'Determines which benchmark defaults apply.',affects:'Default assumptions, margins, CAC benchmarks.',type:'select',options:['HealthTech','WealthTech / FinTech','PropTech','Hospitality Tech','Retail Tech','General B2B SaaS','EdTech','LegalTech','Other'],def:'General B2B SaaS',defSource:'SBH default',required:true},
      {q:3,label:'Customer Type',plain:'Who is your primary customer?',why:'B2B vs B2C changes unit economics, sales cycles, and pricing.',affects:'CAC, LTV/CAC ratios, sales cycle defaults.',type:'select',options:['B2B - SMB','B2B - Mid-Market','B2B - Enterprise','B2C','B2B2C','B2G (Government)'],def:'B2B - SMB',defSource:'SaaStr 2024',required:true},
      {q:4,label:'Problem & Solution',plain:'In 2-3 sentences, what problem does your company solve?',why:'Core narrative for investment memos.',affects:'Investment memo: Problem, Solution, Overview.',type:'textarea',required:true,charLimit:500},
      {q:5,label:'Company Phase',plain:'Which stage best describes your company?',why:'Phase determines defaults, model structure, and scoring criteria.',affects:'Entire model structure.',type:'select',options:['Idea','Pre-Seed','Seed','Series A+'],def:'Idea',defSource:'Auto-classified',required:true},
      {q:6,label:'Team Size',plain:'How many people are on your team (FTEs)?',why:'Used for headcount planning and burn rate.',affects:'Expense model, headcount tab.',type:'number',def:'2',defSource:'SaaStr early-stage median',required:true},
      {q:7,label:'Incorporation State',plain:'Where is your company incorporated?',why:'Affects legal costs and Louisiana incentive eligibility.',affects:'Legal costs, incentive toggle.',type:'text',def:'Delaware',defSource:'Standard SaaS'},
      {q:8,label:'Operating States',plain:'In which states does your team work?',why:'Determines state-specific incentives.',affects:'Regional cost defaults.',type:'text'},
      {q:9,label:'Capital Raised',plain:'How much total capital has your company raised?',why:'Validates phase classification.',affects:'Funding tab, investor return analysis.',type:'currency',def:'$0',defSource:'Idea-stage default',required:true},
      {q:10,label:'Target Raise Amount',plain:'How much are you looking to raise next?',why:'Critical for funding timeline and investor return model.',affects:'Funding tab, runway, "The Ask" in memos.',type:'currency',def:'$500,000',defSource:'Pre-Seed median (PitchBook 2024)',required:true},
    ]},
    { num:2, title:'Product & Revenue Model', desc:'How your product generates revenue. This builds the revenue engine.', time:8, questions:[
      {q:11,label:'Revenue Model',plain:'How does your company make money?',why:'Determines revenue model structure.',affects:'Revenue tab, MRR/ARR calculations.',type:'select',options:['SaaS Subscription','Usage-Based','Marketplace / Transaction Fee','Licensing','Freemium + Premium','Hybrid','Services + Software'],def:'SaaS Subscription',defSource:'Most common (OpenView 2024)',required:true},
      {q:12,label:'Pricing Tiers',plain:'Describe your pricing tiers and monthly prices.',why:'Used to project revenue per segment.',affects:'Revenue model pricing, ACV calculation.',type:'textarea',def:'Basic: $29/mo, Pro: $99/mo, Enterprise: $299/mo',defSource:'Bessemer 2024',required:true,charLimit:300},
      {q:13,label:'Contract Terms',plain:'What are your typical contract lengths?',why:'Affects revenue recognition and cash flow timing.',affects:'Churn calculations, cash flow projections.',type:'select',options:['Month-to-Month','Annual Contracts','Monthly with Annual Discount','Multi-Year Contracts','Mix of Monthly and Annual'],def:'Monthly with Annual Discount',defSource:'SaaStr benchmarks',required:true},
      {q:14,label:'Current MRR',plain:'What is your current Monthly Recurring Revenue?',why:'Starting point for revenue projections.',affects:'Revenue model Year 1.',type:'currency',def:'$0',defSource:'Pre-revenue default',required:true},
      {q:15,label:'Target Gross Margin',plain:'What gross margin do you expect?',why:'Critical SaaS metric for profitability.',affects:'P&L gross margin, quality gate.',type:'number',def:'70',defSource:'Bessemer median (2024)',required:true},
      {q:16,label:'MRR Growth Rate',plain:'What monthly MRR growth rate are you targeting?',why:'Drives the revenue growth curve.',affects:'5-year revenue projections.',type:'number',def:'15',defSource:'SaaStr top-quartile (2024)',required:true},
      {q:17,label:'Monthly Churn Rate',plain:'What % of customers cancel each month?',why:'Churn is the #1 SaaS killer.',affects:'Customer retention, NRR, LTV.',type:'number',def:'5',defSource:'OpenView median (2024)',required:true},
      {q:18,label:'Net Revenue Retention',plain:'What is your NRR? (expansion − contraction − churn)',why:'Shows if existing customers grow in value.',affects:'Revenue waterfall, cohort analysis.',type:'number',def:'100',defSource:'Bessemer (2024)'},
      {q:19,label:'Time to First Revenue',plain:'Months until first revenue? (0 if already generating)',why:'Determines when revenue starts in model.',affects:'Revenue start date, runway.',type:'number',def:'6',defSource:'Pre-Seed median (CB Insights)',required:true},
      {q:20,label:'AI Infrastructure Cost %',plain:'What % of revenue goes to AI/ML infrastructure?',why:'AI SaaS has unique cost structures.',affects:'COGS, gross margin calculations.',type:'number',def:'20',defSource:'a16z AI SaaS benchmarks (2024)',required:true},
    ]},
    { num:3, title:'Market & Go-to-Market', desc:'Your market opportunity and customer acquisition strategy.', time:7, questions:[
      {q:21,label:'Total Addressable Market',plain:'How big is the total market?',why:'TAM frames opportunity size for investors.',affects:'Market section in memos.',type:'text',def:'$1B+',defSource:'Min VC-backable TAM',required:true},
      {q:22,label:'GTM Motion',plain:'How do you primarily acquire customers?',why:'Determines cost structure and sales efficiency.',affects:'CAC calculations, GTM section.',type:'select',options:['Product-Led Growth','Inside Sales','Field Sales / Enterprise','Channel / Partnerships','PLG + Sales Assist','Marketing-Led / Inbound','Outbound Sales'],def:'Product-Led Growth',defSource:'Most common AI SaaS (OpenView 2024)',required:true},
      {q:23,label:'Sales Cycle Length',plain:'How long does it take to close a deal?',why:'Affects cash flow timing.',affects:'Cash flow projections, sales capacity.',type:'select',options:['< 14 days (self-serve)','14-30 days','30-60 days','60-90 days','90-180 days','180+ days (enterprise)'],def:'14-30 days',defSource:'SaaStr SMB benchmark',required:true},

      {q:25,label:'Average Contract Value',plain:'Annual value of a customer contract?',why:'Used to calculate revenue per customer.',affects:'Revenue model, ARPU.',type:'currency',def:'$3,600',defSource:'$99/mo × 12',required:true},
      {q:26,label:'LTV/CAC Ratio',plain:'What is your Lifetime Value to CAC ratio?',why:'The #1 unit economics metric.',affects:'Quality gate: Unit Economics Viability.',type:'number',def:'3',defSource:'Bessemer minimum viable (2024)',required:true},
      {q:27,label:'CAC Payback Period',plain:'Months until a customer pays back their acquisition cost?',why:'Measures capital efficiency.',affects:'Cash flow model.',type:'number',def:'18',defSource:'SaaStr median (2024)'},
      {q:28,label:'First GTM Hire',plain:'When will you make first dedicated sales/marketing hire?',why:'Impacts headcount planning.',affects:'S&M expense, hiring plan.',type:'text',def:'Month 6-9'},
      {q:29,label:'Ideal Customer Profile',plain:'Describe your ideal customer in 1-2 sentences.',why:'Shapes GTM strategy.',affects:'Memo: GTM Strategy.',type:'textarea',required:true,charLimit:300},
      {q:30,label:'Key Differentiation',plain:'What makes your product uniquely better?',why:'Defines competitive moat.',affects:'Memo: Competitive Landscape.',type:'textarea',required:true,charLimit:400},
    ]},
    { num:4, title:'Operations & Cost Structure', desc:'Your expenses, burn rate, and operational costs drive runway calculations.', time:7, questions:[
      {q:31,label:'Monthly Burn Rate',plain:'How much does your company spend per month?',why:'Determines runway and cash flow.',affects:'Cash flow tab, runway.',type:'currency',def:'$15,000',defSource:'Pre-Seed median (BLS 2024)',required:true},
      {q:32,label:'Current Runway',plain:'How many months can you operate at current burn?',why:'Urgency indicator for fundraising.',affects:'Cash flow, funding timeline.',type:'number',def:'12',defSource:'Target runway',required:true},
      {q:33,label:'Hiring Plan',plain:'How many people will you hire next year?',why:'Headcount is typically largest SaaS expense.',affects:'Headcount tab, expense projections.',type:'number',def:'3',defSource:'Pre-Seed typical',required:true},
      {q:34,label:'Average Salary',plain:'Average annual salary you plan to pay?',why:'Largest expense line item.',affects:'Headcount salary calculations.',type:'currency',def:'$85,000',defSource:'BLS SaaS median (2024)',required:true},
      {q:35,label:'Benefits Burden Rate',plain:'What % on top of salary for benefits/taxes?',why:'True cost exceeds base salary.',affects:'Total compensation calculations.',type:'number',def:'25',defSource:'Standard US rate'},

      {q:40,label:'Legal & Compliance',plain:'Estimated annual legal costs?',why:'Often underestimated. Important for accuracy.',affects:'G&A expense.',type:'currency',def:'$5,000'},

    { num:5, title:'Funding & Capitalization', desc:'Funding history and capital structure for investor return modeling.', time:7, questions:[
      {q:41,label:'Funding History',plain:'List your previous funding rounds.',why:'Builds complete capital history.',affects:'Funding tab, cap table.',type:'textarea',def:'No prior funding',required:true,charLimit:500},

      {q:43,label:'Equity Split',plain:'Current equity split? (founders / investors / ESOP)',why:'Critical for cap table and dilution.',affects:'Cap table, equity dilution.',type:'textarea',def:'Founders: 85%, ESOP: 15%',defSource:'Pre-investment standard',required:true,charLimit:300},
      {q:44,label:'ESOP / Option Pool',plain:'What % reserved for employee stock options?',why:'Investors expect ESOP before investing.',affects:'Cap table, dilution.',type:'number',def:'10',defSource:'Standard pre-round size',required:true},
      {q:45,label:'Instrument Type',plain:'What type of instrument are you raising with?',why:'Affects valuation and terms.',affects:'Deal structure in memos.',type:'select',options:['SAFE (Post-Money)','SAFE (Pre-Money)','Convertible Note','Priced Equity Round','Revenue-Based Financing','Other'],def:'SAFE (Post-Money)',defSource:'Most common Seed (2024)',required:true},
      {q:46,label:'Target Valuation',plain:'Target post-money valuation for next round?',why:'Used for investor return modeling.',affects:'Investor return analysis.',type:'currency',def:'$6,000,000',defSource:'Median Seed (PitchBook 2024)',required:true},
      {q:47,label:'Use of Proceeds',plain:'How will you use the money you raise?',why:'Key section in memos.',affects:'Use of Proceeds section.',type:'textarea',def:'50% Product, 30% S&M, 20% Ops',defSource:'Standard Seed allocation (SaaStr)',required:true,charLimit:400},
      {q:48,label:'Exit Timeline',plain:'When do you envision a potential exit?',why:'Frames investment thesis.',affects:'Investor return analysis.',type:'select',options:['3-5 years','5-7 years','7-10 years','10+ years','No specific timeline'],def:'5-7 years',defSource:'Standard VC lifecycle'},
      {q:49,label:'Exit Type',plain:'What exit path do you envision?',why:'Influences return model.',affects:'Risk factors section.',type:'select',options:['Strategic Acquisition','IPO','PE Buyout','Merger','No Preference'],def:'Strategic Acquisition',defSource:'Most common SaaS exit'},
      {q:50,label:'Target Return Multiple',plain:'What return multiple is achievable for investors?',why:'Sets benchmark for return analysis.',affects:'Investor return model.',type:'select',options:['3x','5x','10x','20x+'],def:'10x',defSource:'Standard VC target'},
    ]},
    { num:6, title:'Vertical & Louisiana Incentives', desc:'Industry-specific questions and Louisiana economic incentives.', time:5, questions:[
      {q:51,label:'Regulatory Requirements',plain:'Any specific regulatory/compliance requirements?',why:'Affects cost structure and timeline.',affects:'Legal costs, risk factors.',type:'textarea',def:'Standard (SOC 2, GDPR)',defSource:'General SaaS baseline',charLimit:300},
      {q:52,label:'Industry-Specific Costs',plain:'Any unusual costs for your vertical?',why:'Ensures expense model captures everything.',affects:'Vertical-specific expenses.',type:'textarea',def:'None',charLimit:300},
      {q:53,label:'Louisiana Operations',plain:'Does your company operate in Louisiana?',why:'Activates Louisiana incentive calculations.',affects:'5 incentive program assessments.',type:'select',options:['Yes - Currently','Yes - Planning to','No'],def:'No',required:true},
      {q:54,label:'Digital Media Focus',plain:'Does your product create digital interactive media?',why:'Eligibility for LA Digital Media Tax Credit (25%).',affects:'Louisiana incentive calculation.',type:'select',options:['Yes','No','Partially'],def:'No'},
      {q:55,label:'Additional Notes',plain:'Anything else we should know?',why:'Catch-all for details that don\'t fit elsewhere.',affects:'Analyst review notes.',type:'textarea',charLimit:500},
    ]},
  ];

  var totalQuestions = MODULES.reduce(function(s,m){return s+m.questions.length;},0);

  // ─── Utilities ───────────────────────────────
  function toast(msg,type){var t=document.createElement('div');t.className='toast toast-'+(type||'success');t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3500);}
  function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
  function fmt$(n,compact){n=Number(n)||0;if(compact){if(Math.abs(n)>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return'$'+n.toFixed(0);}return'$'+n.toLocaleString();}
  function fmtPct(n){return(Number(n)||0).toFixed(1)+'%';}
  function getAnswered(){return Object.keys(state.responses).filter(function(k){return state.responses[k]&&state.responses[k].trim();}).length;}

  // ─── Router ──────────────────────────────────
  function route(){
    var hash=location.hash.replace('#','')||'start';
    var parts=hash.split('/');
    if(parts[0]==='admin')renderAdmin();
    else if(parts[0]==='report')renderReport(parts[1]);
    else if(parts[0]==='intake'&&state.founder_id)renderIntake();
    else if(parts[0]==='dashboard'&&state.founder_id)renderDashboard();
    else renderStart();
    updateNav(parts[0]);
  }
  window.addEventListener('hashchange',route);

  function updateNav(page){
    var links=[{id:'start',label:'Start'},{id:'intake',label:'Discovery'},{id:'dashboard',label:'Dashboard'},{id:'report',label:'Report'}];
    nav.innerHTML=links.map(function(l){return'<a href="#'+l.id+'" class="'+(page===l.id?'active':'')+'"'+(l.id!=='start'&&!state.founder_id?' style="opacity:0.3;pointer-events:none"':'')+'>'+l.label+'</a>';}).join('');
  }

  // ─── Start / Registration ───────────────────
  function renderStart(){
    app.innerHTML='<div class="card card-dark" style="text-align:center;padding:2.5rem;"><h2 style="font-size:1.8rem;font-weight:300;margin-bottom:0.25rem;letter-spacing:-0.02em;">AI SaaS Founder Pro Forma</h2><p class="tagline" style="color:var(--gold-light);font-size:0.95rem;margin-bottom:0.5rem;">Laissez les bons temps coder!</p><p style="color:var(--cypress-mist);font-size:0.85rem;">Discovery, data collection & investor-ready financial model generation.</p><p class="mono" style="color:var(--pale-clay);margin-top:0.5rem;">55 questions · 6 modules · ~40 minutes · Industry benchmarks auto-fill gaps</p></div><div class="card card-accent"><h2>Get Started</h2><p class="text-muted" style="margin-bottom:1.25rem;">Enter your details to begin or resume your discovery intake.</p><div style="max-width:400px;"><label class="input-label">Full Name *</label><input type="text" id="sName" class="input" style="margin-bottom:0.75rem;"><label class="input-label">Email *</label><input type="email" id="sEmail" class="input" style="margin-bottom:0.75rem;"><label class="input-label">Company Name *</label><input type="text" id="sCompany" class="input" style="margin-bottom:1.25rem;"><button class="btn btn-dark" id="startBtn" style="width:100%;">Begin Discovery →</button><p id="startError" style="color:var(--brick-red);font-size:0.85rem;margin-top:0.75rem;"></p></div></div><div class="card"><h3 style="margin-top:0;font-family:\'Barlow Semi Condensed\',sans-serif;font-size:1.1rem;">How It Works</h3><div class="metric-grid" style="margin-top:0.75rem;"><div class="metric"><div class="metric-val text-gold">1</div><div class="metric-label">Answer Questions</div><p style="font-size:0.8rem;margin-top:0.25rem;">55 guided questions with context</p></div><div class="metric"><div class="metric-val text-gold">2</div><div class="metric-label">Skip with Defaults</div><p style="font-size:0.8rem;margin-top:0.25rem;">Industry benchmarks fill the gaps</p></div><div class="metric"><div class="metric-val text-gold">3</div><div class="metric-label">Get Your Model</div><p style="font-size:0.8rem;margin-top:0.25rem;">5-year P&L, unit economics, Finance Score</p></div></div></div>';
    document.getElementById('startBtn').addEventListener('click',function(){
      var name=document.getElementById('sName').value.trim();
      var email=document.getElementById('sEmail').value.trim();
      var company=document.getElementById('sCompany').value.trim();
      if(!name||!email||!company){document.getElementById('startError').textContent='All fields required.';return;}
      this.disabled=true;this.textContent='Starting...';
      fetch(API+'/api/founders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,name:name,company_name:company})})
      .then(function(r){return r.json();}).then(function(d){
        if(d.success){state.founder_id=d.founder_id;state.email=email;
          fetch(API+'/api/responses/'+d.founder_id).then(function(r){return r.json();}).then(function(rd){
            Object.keys(rd.responses||{}).forEach(function(k){state.responses[k]=rd.responses[k].value;});
            location.hash='intake';
          });
        }else{document.getElementById('startError').textContent=d.error||'Error';document.getElementById('startBtn').disabled=false;document.getElementById('startBtn').textContent='Begin Discovery →';}
      }).catch(function(e){document.getElementById('startError').textContent=e.message;document.getElementById('startBtn').disabled=false;document.getElementById('startBtn').textContent='Begin Discovery →';});
    });
    document.getElementById('sCompany').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('startBtn').click();});
  }

  // ─── Guided Intake ──────────────────────────
  function renderIntake(){
    var mod=MODULES[state.currentModule-1];
    var q=mod.questions[state.currentQ];
    var answered=getAnswered();
    var pct=Math.round(answered/totalQuestions*100);
    var key=mod.num+'_'+q.q;
    var curVal=state.responses[key]||'';

    var h='';
    h+='<div class="card" style="padding:1rem 1.25rem;"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;"><div><span class="mono text-muted">Module '+mod.num+'/'+MODULES.length+'</span><strong style="margin-left:0.5rem;font-family:\'Barlow Semi Condensed\',sans-serif;letter-spacing:0.02em;">'+esc(mod.title)+'</strong></div><div class="mono text-muted">~'+mod.time+' min · Q'+(state.currentQ+1)+'/'+mod.questions.length+'</div></div><p style="font-size:0.85rem;color:var(--muted);margin:0.5rem 0 0;">'+esc(mod.desc)+'</p></div>';

    h+='<div style="margin-bottom:0.5rem;"><div style="display:flex;justify-content:space-between;" class="mono text-muted"><span>'+answered+'/'+totalQuestions+' answered</span><span>'+pct+'%</span></div><div class="progress"><div class="progress-fill" style="width:'+pct+'%;background:var(--ocher-gold);"></div></div></div>';

    h+='<div class="module-pills">';
    MODULES.forEach(function(m){
      var mAns=0;m.questions.forEach(function(mq){if(state.responses[m.num+'_'+mq.q])mAns++;});
      var isCur=m.num===state.currentModule;var isDone=mAns===m.questions.length;
      h+='<div class="module-pill'+(isCur?' active':'')+(isDone?' complete':'')+'" data-mod="'+m.num+'">'+m.num+(isDone?' ✓':'')+'</div>';
    });
    h+='</div>';

    h+='<div class="card card-accent" style="padding:1.75rem;">';
    if(q.why)h+='<div class="tip tip-why"><span class="tip-label">Why we ask</span>'+esc(q.why)+'</div>';
    h+='<h2 style="font-size:1.15rem;margin-bottom:0.25rem;">'+esc(q.plain)+'</h2>';
    h+='<p class="mono text-muted" style="margin-bottom:1rem;">'+esc(q.label)+(q.required?' <span style="color:var(--brick-red);">*</span>':'')+'</p>';
    if(q.affects)h+='<div class="tip tip-affects"><span class="tip-label">What this affects</span>'+esc(q.affects)+'</div>';

    if(q.type==='select'){
      h+='<select class="input" id="qInput"><option value="">Select...</option>';
      (q.options||[]).forEach(function(o){h+='<option value="'+esc(o)+'"'+(curVal===o?' selected':'')+'>'+esc(o)+'</option>';});
      h+='</select>';
    }else if(q.type==='textarea'){
      h+='<textarea class="input" id="qInput" maxlength="'+(q.charLimit||500)+'" placeholder="'+esc(q.plain)+'">'+esc(curVal)+'</textarea>';
      if(q.charLimit)h+='<div class="mono text-muted" style="text-align:right;margin-top:0.25rem;" id="charCount">'+(curVal.length||0)+'/'+q.charLimit+'</div>';
    }else if(q.type==='currency'){
      h+='<div class="input-currency"><span>$</span><input type="text" class="input" id="qInput" value="'+esc(curVal.replace(/^\$/,''))+'" placeholder="e.g. 500,000"></div>';
    }else if(q.type==='number'){
      h+='<input type="number" class="input" id="qInput" value="'+esc(curVal)+'" placeholder="'+esc(q.def||'')+'" style="max-width:200px;">';
    }else{
      h+='<input type="text" class="input" id="qInput" value="'+esc(curVal)+'" placeholder="'+esc(q.def||'')+'">';
    }
    h+='</div>';

    if(q.def){
      h+='<div class="skip-box"><div><p style="font-size:0.85rem;font-weight:500;margin:0;">Skip this question?</p><p class="mono text-muted" style="margin:0.15rem 0 0;font-size:0.75rem;">Benchmark: <strong>'+esc(q.def)+'</strong>'+(q.defSource?' — '+esc(q.defSource):'')+'</p></div><button class="btn btn-outline btn-sm" id="skipBtn">Use Default</button></div>';
    }

    if(curVal)h+='<div class="mono text-green" style="font-size:0.75rem;margin-bottom:0.75rem;">✓ Saved</div>';

    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.5rem;"><button class="btn btn-outline" id="prevBtn"'+(state.currentModule===1&&state.currentQ===0?' disabled':'')+'>← Previous</button><span class="mono text-muted no-print" style="font-size:0.75rem;">Auto-saved</span><button class="btn btn-dark" id="nextBtn">'+(state.currentModule===MODULES.length&&state.currentQ===mod.questions.length-1?'Generate Model →':'Next →')+'</button></div>';

    app.innerHTML=h;

    app.querySelectorAll('.module-pill').forEach(function(pill){
      pill.addEventListener('click',function(){state.currentModule=parseInt(this.dataset.mod);state.currentQ=0;renderIntake();});
    });

    var inp=document.getElementById('qInput');
    if(inp&&q.charLimit){inp.addEventListener('input',function(){var el=document.getElementById('charCount');if(el)el.textContent=this.value.length+'/'+q.charLimit;});}

    var saveTimer=null;
    if(inp){inp.addEventListener('input',function(){
      clearTimeout(saveTimer);var val=this.value;
      saveTimer=setTimeout(function(){saveResponse(key,val);},1200);
    });
    inp.addEventListener('change',function(){clearTimeout(saveTimer);saveResponse(key,this.value);});}

    document.getElementById('prevBtn')?.addEventListener('click',function(){
      if(state.currentQ>0){state.currentQ--;}else if(state.currentModule>1){state.currentModule--;state.currentQ=MODULES[state.currentModule-1].questions.length-1;}
      renderIntake();
    });

    document.getElementById('nextBtn')?.addEventListener('click',function(){
      var val=(inp?inp.value:'').trim();
      if(q.required&&!val&&!state.responses[key]){toast('This question is required.','error');return;}
      if(val)saveResponse(key,val);
      if(state.currentQ<mod.questions.length-1){state.currentQ++;}
      else if(state.currentModule<MODULES.length){state.currentModule++;state.currentQ=0;}
      else{generateModel();return;}
      renderIntake();
    });

    document.getElementById('skipBtn')?.addEventListener('click',function(){
      saveResponse(key,q.def,'skipped_default');
      if(state.currentQ<mod.questions.length-1){state.currentQ++;}
      else if(state.currentModule<MODULES.length){state.currentModule++;state.currentQ=0;}
      else{generateModel();return;}
      renderIntake();
    });

    if(inp)inp.focus();
  }

  function saveResponse(key,value,type){
    state.responses[key]=value;
    var parts=key.split('_');
    fetch(API+'/api/responses',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      founder_id:state.founder_id,module_number:parseInt(parts[0]),question_number:parseInt(parts[1]),response_value:value,response_type:type||'founder_provided'
    })}).catch(function(){});
  }

  function generateModel(){
    app.innerHTML='<div style="text-align:center;padding:4rem;"><div style="font-size:2rem;margin-bottom:1rem;">⚙️</div><h2>Generating Your Financial Model...</h2><p class="text-muted">Building 5-year projections from your '+getAnswered()+' responses + industry benchmarks.</p></div>';
    fetch(API+'/api/generate-model/'+state.founder_id,{method:'POST',headers:{'Content-Type':'application/json'}})
    .then(function(r){return r.json();}).then(function(d){
      if(d.success){toast('Model generated!','success');location.hash='dashboard';}
      else{toast(d.error||'Generation failed','error');location.hash='intake';}
    }).catch(function(e){toast(e.message,'error');location.hash='intake';});
  }

      if(d.error){app.innerHTML='<div class="card card-accent" style="text-align:center;padding:2rem;"><h2>No Model Yet</h2><p>Complete the discovery intake to generate your financial model.</p><a href="#intake" class="btn btn-dark" style="margin-top:1rem;text-decoration:none;">Go to Intake →</a></div>';return;}

      if(m.assumptions){
        h+='<div class="card" style="background:var(--warm-cream);"><span class="mono" style="font-size:0.65rem;color:var(--marsh-olive);text-transform:uppercase;letter-spacing:0.08em;">Key Assumptions</span><div class="metric-grid" style="margin-top:0.5rem;">';
        var aLabels={mrr_growth:'MRR Growth',gross_margin:'Gross Margin',monthly_churn:'Churn Rate',cac:'CAC',acv:'ACV',monthly_burn:'Monthly Burn',team_size:'Team Size',target_raise:'Target Raise'};

          h+='<div style="text-align:center;"><div style="font-weight:700;color:var(--deep-black);font-family:\'Barlow Semi Condensed\',sans-serif;font-size:1.1rem;">'+display+'</div><div class="mono text-muted" style="font-size:0.6rem;">'+(aLabels[k]||k)+'</div></div>';

        h+='<div class="metric"><div class="metric-val" style="color:var(--deep-black);">'+fmtPct(ue.gross_margin)+'</div><div class="metric-label">Gross Margin</div></div>';
        h+='<div class="metric"><div class="metric-val" style="color:var(--deep-black);">'+fmtPct(ue.monthly_churn)+'</div><div class="metric-label">Monthly Churn</div></div>';
        h+='<div class="metric"><div class="metric-val" style="color:var(--deep-black);">'+fmt$(ue.acv)+'</div><div class="metric-label">ACV</div></div>';
        h+='</div></div>';
      }

        h+='<div class="card"><h3 style="margin-top:0;">Cash Position & Runway</h3><div class="metric-grid">';
        m.cash_position.forEach(function(c){
          h+='<div class="metric"><div class="metric-val" style="color:'+(c.cash_balance<0?'var(--brick-red)':'var(--bayou-green)')+';">'+fmt$(c.cash_balance,true)+'</div><div class="metric-label">Year '+c.year+'</div><div class="mono text-muted" style="font-size:0.6rem;">'+(c.runway_months>=60?'Cash positive':c.runway_months+'mo runway')+'</div>'+(c.milestone?'<div style="font-size:0.7rem;margin-top:0.25rem;color:var(--ocher-gold);">'+esc(c.milestone)+'</div>':'')+'</div>';
        });
        h+='</div></div>';
      }

      if(m.headcount_summary&&m.headcount_summary.length){
        h+='<div class="card"><h3 style="margin-top:0;">Headcount Projection</h3><div class="metric-grid">';
        m.headcount_summary.forEach(function(hc){
          h+='<div class="metric"><div class="metric-val" style="color:var(--deep-black);">'+hc.total+'</div><div class="metric-label">Year '+hc.year+'</div><div class="mono text-muted" style="font-size:0.6rem;">Eng:'+hc.engineering+' S&M:'+hc.sales_marketing+' G&A:'+hc.general_admin+'</div></div>';
        });
        h+='</div></div>';
      }

      if(m.funding_summary){
        var fs2=m.funding_summary;
        h+='<div class="card card-accent"><h3 style="margin-top:0;">Funding & Break-Even</h3><div class="metric-grid"><div class="metric"><div class="metric-val" style="color:var(--ocher-gold);">'+fmt$(fs2.current_raise,true)+'</div><div class="metric-label">Current Raise</div></div><div class="metric"><div class="metric-val" style="color:var(--deep-black);">'+fmt$(fs2.total_funding_needed,true)+'</div><div class="metric-label">Total Funding</div></div><div class="metric"><div class="metric-val" style="color:'+(fs2.break_even_year?'var(--bayou-green)':'var(--ocher-gold)')+';">'+(fs2.break_even_year?'Year '+fs2.break_even_year:'Beyond Y5')+'</div><div class="metric-label">Break-Even</div></div><div class="metric"><div class="metric-val" style="color:var(--deep-black);">'+fmt$(fs2.valuation,true)+'</div><div class="metric-label">Valuation</div></div></div></div>';
      }

      h+='<div class="card card-dark" style="text-align:center;"><h3 style="margin-top:0;">Ready for Next Steps?</h3><p style="color:var(--cypress-mist);">Share this model with the SBH team for review and refinement.</p><div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1rem;"><a href="https://siliconbayou.ai" target="_blank" class="btn btn-gold" style="text-decoration:none;">Connect with SBH →</a><button class="btn btn-outline" style="color:var(--warm-cream);border-color:var(--pale-clay);" onclick="window.print()">Download PDF</button></div></div>';

      app.innerHTML=h;
    }).catch(function(e){app.innerHTML='<div class="card"><p class="text-danger">'+e.message+'</p></div>';});
  }

  // ─── Report (public) ────────────────────────
  function renderReport(email){
    email=email||decodeURIComponent(prompt('Enter your email:')||'');
    if(!email){location.hash='start';return;}
    app.innerHTML='<div style="text-align:center;padding:3rem;" class="text-muted">Loading report...</div>';
    fetch(API+'/api/report/'+encodeURIComponent(email)).then(function(r){return r.json();}).then(function(d){
      if(d.error){app.innerHTML='<div class="card"><h2>Not Found</h2><p>'+esc(d.error)+'</p><a href="#start">← Back</a></div>';return;}
      state.email=email;
      if(d.model){
        var h='<div class="card card-dark" style="text-align:center;"><h2 style="margin-bottom:0.25rem;">'+esc(d.founder.company)+' — Pro Forma Report</h2><p style="color:var(--cypress-mist);">'+esc(d.founder.name)+' · '+esc(d.founder.phase)+' · '+esc(d.founder.vertical)+'</p><p class="mono" style="color:var(--pale-clay);font-size:0.75rem;">Generated: '+(d.generated_at||'N/A')+' · Intake: '+d.intake_progress.pct+'% ('+d.intake_progress.answered+'/'+d.intake_progress.total+')</p></div>';
        h+='<div class="card"><p>Your full executive dashboard is available after login. <a href="#start" style="color:var(--ocher-gold);">Start or resume your intake →</a></p></div>';
        app.innerHTML=h;
      }else{
        app.innerHTML='<div class="card card-accent" style="text-align:center;"><h2>'+esc(d.founder.company)+'</h2><p>Intake Progress: '+d.intake_progress.pct+'% ('+d.intake_progress.answered+'/'+d.intake_progress.total+')</p><p class="text-muted" style="margin-top:1rem;">Complete your intake and generate a model to see your executive dashboard.</p><a href="#start" class="btn btn-dark" style="margin-top:1rem;text-decoration:none;">Continue Intake →</a></div>';
      }
    }).catch(function(e){app.innerHTML='<div class="card"><p class="text-danger">'+e.message+'</p></div>';});
  }

  // ─── Admin ──────────────────────────────────
  function renderAdmin(){
    var token=sessionStorage.getItem('sbh_admin_token');
    if(!token){renderAdminLogin();return;}
    app.innerHTML='<div style="text-align:center;padding:2rem;" class="text-muted">Loading...</div>';
    fetch(API+'/api/admin/analytics',{headers:{'Authorization':'Bearer '+token}})
    .then(function(r){if(r.status===401){sessionStorage.removeItem('sbh_admin_token');renderAdminLogin();throw new Error('auth');}return r.json();})
    .then(function(a){
      return fetch(API+'/api/admin/founders',{headers:{'Authorization':'Bearer '+token}}).then(function(r){return r.json();}).then(function(fData){

        window.exportCSV=function(){
          fetch(API+'/api/admin/export-csv',{headers:{'Authorization':'Bearer '+token}})
          .then(function(r){return r.blob();}).then(function(blob){
            var url=URL.createObjectURL(blob);var a2=document.createElement('a');a2.href=url;a2.download='proforma-founders.csv';
            document.body.appendChild(a2);a2.click();a2.remove();URL.revokeObjectURL(url);toast('CSV downloaded!','success');
          });
        };

        var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:0.5rem;"><h2 style="margin:0;">Admin Dashboard</h2><div style="display:flex;gap:0.5rem;"><button class="btn btn-sm btn-gold" onclick="exportCSV()">Export CSV</button><button class="btn btn-sm btn-danger" onclick="sessionStorage.removeItem(\'sbh_admin_token\');location.hash=\'admin\';">Logout</button></div></div>';
        h+='<div class="grid-3" style="margin-bottom:1.25rem;">';
        h+='<div class="card admin-stat"><div class="admin-stat-val">'+a.total+'</div><div class="admin-stat-label">Total Founders</div></div>';
        h+='<div class="card admin-stat"><div class="admin-stat-val">'+a.modelsGenerated+'</div><div class="admin-stat-label">Models Generated</div></div>';
        h+='<div class="card admin-stat"><div class="admin-stat-val">'+(a.avgScore>0?a.avgScore.toFixed(1):'—')+'</div><div class="admin-stat-label">Avg Finance Score</div></div>';
        h+='</div>';

        if(a.byPhase.length||a.byVertical.length){
          h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem;">';
          if(a.byPhase.length){h+='<div class="card"><h3 style="margin-top:0;">By Phase</h3>';var maxP=Math.max.apply(null,a.byPhase.map(function(x){return x.count;}));a.byPhase.forEach(function(x){h+='<div style="margin-bottom:0.4rem;"><div style="display:flex;justify-content:space-between;font-size:0.8rem;"><span>'+esc(x.label)+'</span><span class="mono">'+x.count+'</span></div><div class="progress"><div class="progress-fill" style="width:'+(x.count/maxP*100)+'%;background:var(--deep-black);"></div></div></div>';});h+='</div>';}
          if(a.byVertical.length){h+='<div class="card"><h3 style="margin-top:0;">By Vertical</h3>';var maxV=Math.max.apply(null,a.byVertical.map(function(x){return x.count;}));a.byVertical.forEach(function(x){h+='<div style="margin-bottom:0.4rem;"><div style="display:flex;justify-content:space-between;font-size:0.8rem;"><span>'+esc(x.label)+'</span><span class="mono">'+x.count+'</span></div><div class="progress"><div class="progress-fill" style="width:'+(x.count/maxV*100)+'%;background:var(--ocher-gold);"></div></div></div>';});h+='</div>';}
          h+='</div>';
        }

        var founders=fData.founders||[];
        h+='<div class="card"><h3 style="margin-top:0;">All Founders ('+founders.length+')</h3>';
        if(founders.length){
          h+='<div style="overflow-x:auto;"><table class="tbl"><thead><tr><th>Company</th><th>Founder</th><th>Phase</th><th style="text-align:center;">Answers</th><th style="text-align:center;">Score</th><th>Date</th></tr></thead><tbody>';
          founders.forEach(function(f){
            h+='<tr><td>'+esc(f.company_name)+'</td><td>'+esc(f.name)+'</td><td>'+esc(f.phase)+'</td><td style="text-align:center;">'+f.answers_count+'/55</td><td style="text-align:center;">'+(f.latest_score?f.latest_score+'/5':'—')+'</td><td>'+new Date(f.created_at).toLocaleDateString()+'</td></tr>';
          });
          h+='</tbody></table></div>';
        }else{h+='<p class="text-muted" style="text-align:center;padding:2rem;">No founders yet.</p>';}
        h+='</div>';
        app.innerHTML=h;
      });
    }).catch(function(e){if(e.message!=='auth')app.innerHTML='<div class="card"><p class="text-danger">'+e.message+'</p></div>';});
  }

  function renderAdminLogin(){
    app.innerHTML='<div style="max-width:380px;margin:3rem auto;"><div class="card card-accent"><h2>Admin Login</h2><label class="input-label">Email</label><input type="email" id="aEmail" class="input" style="margin-bottom:0.75rem;"><label class="input-label">Password</label><input type="password" id="aPass" class="input" style="margin-bottom:1rem;"><button class="btn btn-dark" id="aLoginBtn" style="width:100%;">Login</button><p id="aError" style="color:var(--brick-red);text-align:center;margin-top:0.75rem;font-size:0.85rem;"></p></div></div>';
    document.getElementById('aLoginBtn').addEventListener('click',function(){
      fetch(API+'/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('aEmail').value,password:document.getElementById('aPass').value})})
      .then(function(r){return r.json();}).then(function(d){if(d.success){sessionStorage.setItem('sbh_admin_token',d.token);renderAdmin();}else{document.getElementById('aError').textContent=d.error||'Invalid';}});
    });
    document.getElementById('aPass').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('aLoginBtn').click();});
  }

  route();
})();
</script>
</body>
</html>
