<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBH Pro Forma — Silicon Bayou Holdings</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --deep-black:#130702;--pure-white:#FFFFFF;--warm-cream:#FDF4E2;
      --marsh-olive:#676C5C;--cypress-mist:#959685;--rust-brown:#866244;
      --ocher-gold:#B58A4B;--gold-light:#D7B878;--bayou-green:#4F5B45;
      --swamp-pine:#2E382B;--brick-red:#9C4F38;--iron-red:#6E3525;
      --slate-blue:#4E5E68;--sky-mist:#7D8C96;
      --pale-clay:#C9B9A6;--deep-clay:#9F8C77;
      --bg:#FDF8F0;--text:#130702;--muted:#7D8C96;--border:#C9B9A6;
      --success:#4F5B45;--warning:#B58A4B;--danger:#9C4F38
    }
    body{font-family:'Manrope',sans-serif;line-height:1.6;color:var(--text);background:var(--bg)}
    h1,h2,h3,.heading{font-family:'Barlow Semi Condensed',sans-serif}

    /* Header */
    .header{background:var(--deep-black);color:var(--warm-cream);padding:1.25rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
    .header-brand{display:flex;align-items:center;gap:0.75rem;flex-shrink:0}
    .header-logo-text{flex-shrink:0;white-space:nowrap}
    .header-sub{font-size:0.7rem;color:var(--cypress-mist);letter-spacing:0.03em;white-space:nowrap}
    .header-nav{display:flex;gap:0.35rem}
    .header-nav a{color:var(--cypress-mist);text-decoration:none;font-size:0.8rem;padding:0.4rem 0.75rem;border-radius:4px;transition:all 0.2s;font-weight:500;font-family:'Barlow Semi Condensed',sans-serif;letter-spacing:0.02em}
    .header-nav a:hover{color:var(--warm-cream);background:rgba(253,244,226,0.08)}
    .header-nav a.active{color:var(--ocher-gold);background:rgba(181,138,75,0.12)}

    .container{max-width:800px;margin:0 auto;padding:2rem}

    /* Cards */
    .card{background:var(--pure-white);border:1px solid var(--border);border-radius:8px;padding:1.5rem;margin-bottom:1.25rem}
    .card-accent{border-left:3px solid var(--ocher-gold)}
    .card-dark{background:var(--deep-black);color:var(--warm-cream);border-color:rgba(181,138,75,0.3)}
    .card-dark h2,.card-dark h3,.card-dark strong{color:var(--warm-cream)}
    .card-dark .text-muted{color:var(--cypress-mist)}

    h2{font-size:1.35rem;font-weight:600;color:var(--deep-black);margin-bottom:0.75rem;letter-spacing:-0.01em}
    h3{font-size:1rem;font-weight:600;color:var(--deep-black);margin:1rem 0 0.5rem;letter-spacing:0.01em}
    p{margin-bottom:0.5rem}
    .mono{font-family:'IBM Plex Mono',monospace;font-size:0.8rem;letter-spacing:0.02em}
    .text-muted{color:var(--muted)}
    .text-gold{color:var(--ocher-gold)}
    .text-green{color:var(--bayou-green)}
    .text-danger{color:var(--brick-red)}

    /* Inputs */
    .input{width:100%;padding:0.65rem 0.75rem;border:1px solid var(--pale-clay);border-radius:6px;font-size:0.95rem;font-family:'Manrope',sans-serif;color:var(--text);background:var(--pure-white);transition:border-color 0.2s;outline:none}
    .input:focus{border-color:var(--ocher-gold)}
    textarea.input{min-height:80px;resize:vertical}
    select.input{cursor:pointer;appearance:auto}
    .input-currency{position:relative}.input-currency span{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--muted);font-family:'IBM Plex Mono',monospace}.input-currency .input{padding-left:1.5rem}
    .input-label{display:block;font-size:0.8rem;font-weight:600;color:var(--marsh-olive);margin-bottom:0.35rem;letter-spacing:0.02em;text-transform:uppercase;font-family:'Barlow Semi Condensed',sans-serif}

    /* Buttons */
    .btn{padding:0.6rem 1.5rem;border:none;border-radius:6px;cursor:pointer;font-size:0.9rem;font-weight:600;font-family:'Barlow Semi Condensed',sans-serif;letter-spacing:0.03em;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.4rem}
    .btn-dark{background:var(--deep-black);color:var(--warm-cream)}.btn-dark:hover{background:#2a1d10}
    .btn-gold{background:var(--ocher-gold);color:var(--pure-white)}.btn-gold:hover{background:var(--rust-brown)}
    .btn-outline{background:transparent;border:1px solid var(--pale-clay);color:var(--text)}.btn-outline:hover{border-color:var(--ocher-gold);color:var(--ocher-gold)}
    .btn-sm{font-size:0.8rem;padding:0.4rem 1rem}
    .btn-danger{background:var(--brick-red);color:var(--pure-white);font-size:0.8rem;padding:0.4rem 1rem}
    .btn:disabled{opacity:0.4;cursor:not-allowed}

    /* Progress */
    .progress{height:4px;background:var(--pale-clay);border-radius:2px;overflow:hidden;margin:0.5rem 0}
    .progress-fill{height:100%;border-radius:2px;transition:width 0.4s ease}

    /* Module pills */
    .module-pills{display:flex;gap:0.35rem;flex-wrap:wrap;justify-content:center;margin:1rem 0}
    .module-pill{padding:0.3rem 0.6rem;border:1px solid var(--pale-clay);border-radius:4px;font-size:0.75rem;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all 0.2s;background:var(--pure-white)}
    .module-pill.active{border-color:var(--ocher-gold);background:rgba(181,138,75,0.06);font-weight:600;color:var(--deep-black)}
    .module-pill.complete{background:rgba(79,91,69,0.08);color:var(--bayou-green);border-color:var(--bayou-green)}

    /* Tip boxes */
    .tip{padding:0.75rem 1rem;border-radius:6px;font-size:0.85rem;margin-bottom:0.75rem;line-height:1.6}
    .tip-why{background:rgba(79,91,69,0.05);border:1px solid rgba(79,91,69,0.15)}
    .tip-affects{background:rgba(181,138,75,0.06);border:1px solid rgba(181,138,75,0.15)}
    .tip-label{font-family:'Barlow Semi Condensed',sans-serif;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--marsh-olive);display:block;margin-bottom:0.25rem;font-weight:600}

    /* Skip box */
    .skip-box{border:1px solid var(--pale-clay);border-radius:6px;padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:0.75rem;background:rgba(253,244,226,0.4)}
    .glossary-fab{position:fixed;bottom:1.5rem;right:1.5rem;width:48px;height:48px;border-radius:50%;background:var(--deep-black);color:var(--warm-cream);border:2px solid var(--ocher-gold);font-size:1.2rem;cursor:pointer;z-index:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.3);transition:transform 0.2s}
    .glossary-fab:hover{transform:scale(1.1)}
    .glossary-panel{position:fixed;bottom:4.5rem;right:1.5rem;width:380px;max-width:calc(100vw - 2rem);max-height:60vh;background:var(--white);border:1px solid var(--pale-clay);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.15);z-index:901;display:flex;flex-direction:column;overflow:hidden}
    .glossary-panel.hidden{display:none}
    .glossary-header{padding:1rem 1.25rem;background:var(--deep-black);color:var(--warm-cream);display:flex;justify-content:space-between;align-items:center}
    .glossary-header h3{margin:0;font-family:'Barlow Semi Condensed',sans-serif;font-size:1rem}
    .glossary-search{padding:0.75rem 1rem;border-bottom:1px solid var(--pale-clay)}
    .glossary-search input{width:100%;padding:0.5rem 0.75rem;border:1px solid var(--pale-clay);border-radius:6px;font-size:0.85rem;font-family:Manrope,sans-serif}
    .glossary-search input:focus{outline:none;border-color:var(--ocher-gold)}
    .glossary-list{overflow-y:auto;padding:0.5rem 0;flex:1}
    .glossary-item{padding:0.6rem 1.25rem;border-bottom:1px solid rgba(201,185,166,0.2)}
    .glossary-item:last-child{border-bottom:none}
    .glossary-term{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:0.9rem;color:var(--ocher-gold);margin-bottom:0.15rem}
    .glossary-def{font-size:0.8rem;color:var(--deep-black);line-height:1.45}
    .glossary-highlight{background:rgba(181,138,75,0.15);border-left:3px solid var(--ocher-gold)}
    @media(max-width:480px){.glossary-panel{width:calc(100vw - 1rem);right:0.5rem;bottom:4rem;max-height:50vh}}

    /* Metric cards */
    .metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.75rem}
    .metric{background:var(--warm-cream);border:1px solid rgba(201,185,166,0.5);border-radius:6px;padding:0.75rem;text-align:center}
    .metric-val{font-size:1.4rem;font-weight:700;font-variant-numeric:tabular-nums;font-family:'Barlow Semi Condensed',sans-serif}
    .metric-label{font-size:0.65rem;color:var(--marsh-olive);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.04em;margin-top:0.15rem}

    /* Tables */
    .tbl{width:100%;border-collapse:collapse;font-size:0.8rem;font-variant-numeric:tabular-nums}
    .tbl th{text-align:right;padding:0.5rem;font-weight:600;color:var(--deep-black);border-bottom:2px solid var(--deep-black);font-family:'Barlow Semi Condensed',sans-serif;letter-spacing:0.02em}
    .tbl th:first-child{text-align:left}
    .tbl td{text-align:right;padding:0.4rem 0.5rem;border-bottom:1px solid rgba(201,185,166,0.4)}
    .tbl td:first-child{text-align:left;font-weight:500}
    .tbl .bold td{font-weight:700}
    .tbl .negative{color:var(--brick-red)}

    /* Score ring */
    .score-ring{width:100px;height:100px;position:relative;margin:0 auto}
    .score-ring svg{transform:rotate(-90deg)}
    .score-ring .score-val{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:700;font-family:'Barlow Semi Condensed',sans-serif}

    /* Bar chart */
    .bar-chart{display:flex;align-items:flex-end;gap:0.5rem;height:160px;padding-top:1rem}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.25rem}
    .bar{width:100%;border-radius:3px 3px 0 0;transition:height 0.5s ease;min-height:2px}
    .bar-label{font-size:0.7rem;font-family:'IBM Plex Mono',monospace;color:var(--muted)}
    .bar-value{font-size:0.7rem;font-weight:600;font-family:'IBM Plex Mono',monospace}

    /* Toast */
    .toast{position:fixed;top:1rem;right:1rem;padding:0.75rem 1.25rem;border-radius:6px;color:var(--pure-white);font-weight:600;font-size:0.85rem;z-index:9999;animation:slideIn 0.3s ease}
    .toast-success{background:var(--bayou-green)}.toast-error{background:var(--brick-red)}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

    /* Footer */
    .footer{text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem;border-top:1px solid var(--pale-clay);margin-top:3rem}
    .footer strong{font-family:'Barlow Semi Condensed',sans-serif;letter-spacing:0.03em}
    .footer a{color:var(--ocher-gold);text-decoration:none;font-weight:600}

    /* Admin */
    .admin-stat{text-align:center;padding:1rem}.admin-stat-val{font-size:2.25rem;font-weight:700;color:var(--deep-black);font-family:'Barlow Semi Condensed',sans-serif}.admin-stat-label{font-size:0.7rem;color:var(--muted);margin-top:0.15rem;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.04em}
    .grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(19,7,2,0.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem}
    .modal{background:var(--pure-white);border-radius:8px;padding:2rem;max-width:700px;width:100%;max-height:90vh;overflow-y:auto}
    .hidden{display:none!important}

    /* Tagline */
    .tagline{font-family:'Manrope',sans-serif;font-style:italic;color:var(--marsh-olive);font-size:0.85rem}

    /* Print */
    @media print{.header,.footer,.btn,.no-print{display:none!important}body{background:#fff}.card{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid}@page{margin:0.75in}}
    @media(max-width:768px){.container{padding:1rem}.card{padding:1rem}.header{flex-direction:column;gap:0.5rem;text-align:center}.metric-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-brand">
      <img src="/silicon-bayou-logo.png?v=3" alt="Silicon Bayou" style="height:40px;width:auto;flex-shrink:0;">
      <div style="width:1px;height:36px;background:rgba(253,244,226,0.15);"></div>
      <span class="header-sub">AI SaaS Founder Pro Forma</span>
    </div>
    <div class="header-nav" id="nav"></div>
  </div>
  <div class="container" id="app"></div>
  <div class="footer">
    <p><strong>SILICON BAYOU HOLDINGS</strong></p>
    <p class="tagline" style="margin-top:0.25rem;">Laissez les bons temps coder!</p>
    <p style="margin-top:0.5rem;">Confidential & Proprietary · <a href="https://siliconbayou.ai" target="_blank">siliconbayou.ai</a></p>
  </div>

<script>
(function(){
  'use strict';
  var API = '';
  var app = document.getElementById('app');
  var nav = document.getElementById('nav');
  var state = { founder_id: null, email: null, responses: {}, page: 'start', currentModule: 1, currentQ: 0 };

  // ─── Questions Data ──────────────────────────
  var MODULES = [
    { num:1, title:'Company Fundamentals', desc:'Tell us about your company, team, and current stage.', time:8, questions:[
      {q:1,label:'Company Name',plain:'What is your company called?',why:'Used throughout your financial model and investment memos.',affects:'All deliverable headers.',type:'text',required:true},
      {q:2,label:'Industry / Vertical',plain:'What industry does your company operate in?',why:'Determines which benchmark defaults apply.',affects:'Default assumptions, margins, CAC benchmarks.',type:'select',options:['HealthTech','WealthTech / FinTech','PropTech','Hospitality Tech','Retail Tech','General B2B SaaS','EdTech','LegalTech','Other'],def:'General B2B SaaS',defSource:'SBH default',required:true},
      {q:3,label:'Customer Type',plain:'Who is your primary customer?',why:'B2B vs B2C changes unit economics, sales cycles, and pricing.',affects:'CAC, LTV/CAC ratios, sales cycle defaults.',type:'select',options:['B2B - SMB','B2B - Mid-Market','B2B - Enterprise','B2C','B2B2C','B2G (Government)'],def:'B2B - SMB',defSource:'SaaStr 2024',required:true},
      {q:4,label:'Problem & Solution',plain:'In 2-3 sentences, what problem does your company solve?',why:'Core narrative for investment memos.',affects:'Investment memo: Problem, Solution, Overview.',type:'textarea',required:true,charLimit:500},
      {q:5,label:'Company Phase',plain:'Which stage best describes your company?',why:'Phase determines defaults, model structure, and scoring criteria.',affects:'Entire model structure.',type:'select',options:['Idea','Pre-Seed','Seed','Series A+'],def:'Idea',defSource:'Auto-classified',required:true},
      {q:6,label:'Team Size',plain:'How many people are on your team (FTEs)?',why:'Used for headcount planning and burn rate.',affects:'Expense model, headcount tab.',type:'number',def:'2',defSource:'SaaStr early-stage median',required:true},
      {q:7,label:'Incorporation State',plain:'Where is your company incorporated?',why:'Affects legal costs and Louisiana incentive eligibility.',affects:'Legal costs, incentive toggle.',type:'text',def:'Delaware',defSource:'Standard SaaS'},
      {q:8,label:'Operating States',plain:'In which states does your team work?',why:'Determines state-specific incentives.',affects:'Regional cost defaults.',type:'text'},
      {q:9,label:'Capital Raised',plain:'How much total capital has your company raised?',why:'Validates phase classification.',affects:'Funding tab, investor return analysis.',type:'currency',def:'$0',defSource:'Idea-stage default',required:true},
      {q:10,label:'Target Raise Amount',plain:'How much are you looking to raise next?',why:'Critical for funding timeline and investor return model.',affects:'Funding tab, runway, "The Ask" in memos.',type:'currency',def:'$500,000',defSource:'Pre-Seed median (PitchBook 2024)',required:true},
    ]},
    { num:2, title:'Product & Revenue Model', desc:'How your product generates revenue. This builds the revenue engine.', time:12, questions:[
      {q:11,label:'Revenue Model',plain:'How does your company make money?',why:'Determines revenue model structure.',affects:'Revenue tab, MRR/ARR calculations.',type:'select',options:['SaaS Subscription','Usage-Based','Marketplace / Transaction Fee','Licensing','Freemium + Premium','Hybrid','Services + Software'],def:'SaaS Subscription',defSource:'Most common (OpenView 2024)',required:true},
      {q:12,label:'Pricing Tiers',plain:'Describe your pricing tiers and monthly prices.',why:'Used to project revenue per segment.',affects:'Revenue model pricing, ACV calculation.',type:'textarea',def:'Basic: $29/mo, Pro: $99/mo, Enterprise: $299/mo',defSource:'Bessemer 2024',required:true,charLimit:300},
      {q:13,label:'Contract Terms',plain:'What are your typical contract lengths?',why:'Affects revenue recognition and cash flow timing.',affects:'Churn calculations, cash flow projections.',type:'select',options:['Month-to-Month','Annual Contracts','Monthly with Annual Discount','Multi-Year Contracts','Mix of Monthly and Annual'],def:'Monthly with Annual Discount',defSource:'SaaStr benchmarks',required:true},
      {q:14,label:'Current MRR',plain:'What is your current Monthly Recurring Revenue?',why:'Starting point for revenue projections. If $0, the next questions build your customer ramp.',affects:'Revenue model Year 1.',type:'currency',def:'$0',defSource:'Pre-revenue default',required:true},
      {q:56,label:'First Paying Customers',plain:'How many paying customers do you expect in your first 6 months of revenue?',why:'15% growth on $0 is still $0. We need to know when real customers start arriving to build an accurate revenue ramp.',affects:'Revenue ramp months 1-6. This is the seed that compounds.',type:'number',def:'5',defSource:'Typical B2B SaaS first 6 months',required:true},
      {q:57,label:'Customers by End of Year 1',plain:'How many paying customers do you expect by the end of Year 1?',why:'This sets the slope of your customer acquisition curve. Combined with pricing, it builds your Year 1 revenue.',affects:'Year 1 ARR, growth trajectory, sales capacity planning.',type:'number',def:'25',defSource:'Pre-Seed SaaS median (SaaStr)',required:true},
      {q:58,label:'Customers by End of Year 2',plain:'How many paying customers do you expect by end of Year 2?',why:'Year 2 shows whether your GTM is scaling. The jump from Year 1 to Year 2 is what investors scrutinize.',affects:'Year 2 revenue, growth rate, hiring needs.',type:'number',def:'100',defSource:'Seed-stage SaaS target',required:true},
      {q:59,label:'Average Revenue Per Customer',plain:'What will an average customer pay you per month?',why:'Not all customers buy the same tier. This blended average × customer count = your MRR at each stage.',affects:'MRR calculations, ACV, revenue projections.',type:'currency',def:'$99',defSource:'B2B SaaS median price point',required:true},
      {q:60,label:'Revenue Concentration Risk',plain:'Will any single customer represent more than 20% of revenue in Year 1?',why:'High customer concentration is a risk factor. If you lose that customer, what happens?',affects:'Risk assessment, revenue diversification score.',type:'select',options:['No — well diversified','Yes — 1 anchor customer expected','Yes — 2-3 large customers','Unsure'],def:'No — well diversified',defSource:'Ideal scenario'},
      {q:15,label:'Target Gross Margin',plain:'What gross margin do you expect?',why:'Critical SaaS metric for profitability. Gross margin = (Revenue − direct costs) / Revenue.',affects:'P&L gross margin, quality gate.',type:'number',def:'70',defSource:'Bessemer median (2024)',required:true},
      {q:16,label:'MRR Growth Rate (After First Customers)',plain:'Once you have paying customers, what monthly growth rate do you expect?',why:'This applies AFTER your first customers arrive. A 15% monthly rate means doubling every ~5 months.',affects:'5-year revenue projections (compounds on your actual customer base, not $0).',type:'number',def:'15',defSource:'SaaStr top-quartile (2024)',required:true},
      {q:17,label:'Monthly Churn Rate',plain:'What % of customers cancel each month?',why:'Churn is the #1 SaaS killer. Even 5% monthly churn means you lose ~46% of customers per year.',affects:'Customer retention, NRR, LTV.',type:'number',def:'5',defSource:'OpenView median (2024)',required:true},
      {q:18,label:'Net Revenue Retention',plain:'What is your NRR? (expansion − contraction − churn)',why:'Shows if existing customers grow in value. NRR above 100% means customers spend more over time.',affects:'Revenue waterfall, cohort analysis.',type:'number',def:'100',defSource:'Bessemer (2024)'},
      {q:19,label:'Time to First Revenue',plain:'How many months from now until your first paying customer?',why:'This is when the revenue ramp begins. Everything before this is $0 revenue.',affects:'Revenue start date, pre-revenue burn, runway.',type:'number',def:'6',defSource:'Pre-Seed median (CB Insights)',required:true},
      {q:20,label:'AI Infrastructure Cost %',plain:'What % of revenue goes to AI/ML infrastructure?',why:'AI SaaS has unique cost structures. OpenAI/Anthropic API costs can eat margins fast.',affects:'COGS, gross margin calculations.',type:'number',def:'20',defSource:'a16z AI SaaS benchmarks (2024)',required:true},
    ]},
    { num:3, title:'Market & Go-to-Market', desc:'Your market opportunity, customer acquisition strategy, and sales infrastructure.', time:10, questions:[
      {q:21,label:'Total Addressable Market',plain:'How big is the total market?',why:'TAM frames opportunity size for investors. Think: if every possible buyer purchased, what\'s the annual spend?',affects:'Market section in memos.',type:'text',def:'$1B+',defSource:'Min VC-backable TAM',required:true},
      {q:22,label:'GTM Motion',plain:'How do you primarily acquire customers?',why:'Determines cost structure and sales efficiency. PLG is cheap but slow; enterprise sales is expensive but high ACV.',affects:'CAC calculations, GTM section, hiring plan.',type:'select',options:['Product-Led Growth','Inside Sales','Field Sales / Enterprise','Channel / Partnerships','PLG + Sales Assist','Marketing-Led / Inbound','Outbound Sales'],def:'Product-Led Growth',defSource:'Most common AI SaaS (OpenView 2024)',required:true},
      {q:61,label:'Marketing Channels',plain:'Which marketing channels will you invest in? (Select all that apply)',why:'Different channels have wildly different costs and timelines. Content marketing takes 6+ months; paid ads are immediate but expensive.',affects:'Marketing budget allocation, CAC by channel.',type:'textarea',def:'Content/SEO, LinkedIn, Product Hunt launch',defSource:'Early-stage B2B SaaS playbook',required:true,charLimit:400},
      {q:62,label:'Monthly Marketing Budget',plain:'How much will you spend on marketing per month?',why:'Marketing spend directly drives customer acquisition. Too low = slow growth. Too high = short runway.',affects:'S&M expense line, CAC calculation, burn rate.',type:'currency',def:'$2,000',defSource:'Pre-Seed median',required:true},
      {q:63,label:'Conversion Rate',plain:'What % of leads/trials will convert to paying customers?',why:'Free trial → paid conversion is typically 2-5% for PLG, 15-25% for sales-assisted. This determines how many leads you need.',affects:'Lead generation targets, marketing spend efficiency.',type:'number',def:'3',defSource:'PLG median (OpenView 2024)',required:true},
      {q:64,label:'Sales Team Plan',plain:'When and how will you build a sales function?',why:'Founder-led sales works for first 10-20 customers. After that, you need dedicated salespeople. Each rep costs $80-120K+ loaded.',affects:'Headcount plan, S&M expense, revenue capacity.',type:'select',options:['Founder-led only (Year 1)','First SDR by month 6','First AE by month 9','Sales team from day 1','No sales team — pure PLG','Outsourced / agency'],def:'Founder-led only (Year 1)',defSource:'Standard for pre-seed'},
      {q:23,label:'Sales Cycle Length',plain:'How long does it take from first contact to signed deal?',why:'A 90-day cycle means revenue is delayed 3 months from when you spend on marketing. This creates cash flow gaps.',affects:'Cash flow projections, sales capacity, pipeline forecasting.',type:'select',options:['< 14 days (self-serve)','14-30 days','30-60 days','60-90 days','90-180 days','180+ days (enterprise)'],def:'14-30 days',defSource:'SaaStr SMB benchmark',required:true},
      {q:24,label:'Customer Acquisition Cost',plain:'How much does it cost to acquire one customer?',why:'Total sales + marketing spend ÷ new customers. Include founder time, ads, tools, events, content creation.',affects:'Unit economics, LTV/CAC ratio, burn rate.',type:'currency',def:'$200',defSource:'OpenView SMB median (2024)',required:true},
      {q:25,label:'Average Contract Value',plain:'Annual value of a customer contract?',why:'ACV × customer count = ARR. Higher ACV means fewer customers needed but usually longer sales cycles.',affects:'Revenue model, ARPU, sales capacity planning.',type:'currency',def:'$3,600',defSource:'$99/mo × 12',required:true},
      {q:65,label:'Upsell / Expansion Strategy',plain:'How will you grow revenue from existing customers?',why:'It costs 5-7x more to acquire a new customer than to expand an existing one. Expansion revenue is the #1 driver of NRR above 100%.',affects:'NRR, revenue retention, Year 2-5 growth.',type:'select',options:['Usage-based expansion (pay more as they use more)','Tier upgrades (Basic → Pro → Enterprise)','Seat-based expansion (add more users)','Add-on products / modules','Annual price increases','No expansion strategy yet'],def:'Tier upgrades (Basic → Pro → Enterprise)',defSource:'Most common SaaS expansion'},
      {q:26,label:'LTV/CAC Ratio',plain:'What is your Lifetime Value to CAC ratio?',why:'LTV = (ARPU × Gross Margin) ÷ Churn. If LTV/CAC < 1, you lose money on every customer. 3:1 is the minimum healthy ratio.',affects:'Quality gate: Unit Economics Viability.',type:'number',def:'3',defSource:'Bessemer minimum viable (2024)',required:true},
      {q:27,label:'CAC Payback Period',plain:'Months until a customer pays back their acquisition cost?',why:'If CAC payback is 18 months, you need 18 months of runway PER customer before they become profitable.',affects:'Cash flow model, funding needs.',type:'number',def:'18',defSource:'SaaStr median (2024)'},
      {q:28,label:'First GTM Hire',plain:'When will you make your first dedicated sales or marketing hire?',why:'Each month delay is slower growth; each month early is higher burn. Timing this hire is critical.',affects:'S&M expense, hiring plan, burn rate.',type:'text',def:'Month 6-9'},
      {q:29,label:'Ideal Customer Profile',plain:'Describe your ideal customer: industry, company size, title of buyer, budget range.',why:'A specific ICP means focused marketing spend. "Everyone" as a target means wasted dollars.',affects:'Memo: GTM Strategy, marketing channel selection.',type:'textarea',required:true,charLimit:400},
      {q:30,label:'Key Differentiation',plain:'What makes your product uniquely better than alternatives? Why would someone switch?',why:'Defines competitive moat. If you can\'t articulate this clearly, neither can your customers.',affects:'Memo: Competitive Landscape, pricing power.',type:'textarea',required:true,charLimit:400},
      {q:66,label:'Competitive Landscape',plain:'Who are your top 3 competitors and how are you different?',why:'Investors will ask this. Knowing your competitors shows market awareness and helps define positioning.',affects:'Competitive analysis, pricing strategy, differentiation.',type:'textarea',def:'No direct competitors identified',charLimit:500},
    ]},
    { num:4, title:'Operations & Cost Structure', desc:'Your expenses, team, infrastructure, and operational costs. This is where most founders underestimate.', time:12, questions:[
      {q:31,label:'Monthly Burn Rate',plain:'How much does your company spend per month right now?',why:'This is your current spend, not projected. We\'ll build projected costs from the detailed questions below.',affects:'Cash flow tab, current runway calculation.',type:'currency',def:'$15,000',defSource:'Pre-Seed median (BLS 2024)',required:true},
      {q:32,label:'Current Runway',plain:'How many months can you operate at current burn?',why:'Under 6 months means urgent fundraising. 12-18 months is ideal.',affects:'Cash flow, funding timeline, urgency.',type:'number',def:'12',defSource:'Target runway',required:true},
      {q:67,label:'Founder Salaries',plain:'What annual salary are founders taking? ($0 if unpaid)',why:'Many founders take $0 early on, but that\'s not sustainable. Investors want to know the real cost when founders start drawing salary.',affects:'Year 1-2 expense projections, true burn rate.',type:'currency',def:'$0',defSource:'Common for pre-seed founders',required:true},
      {q:68,label:'When Do Founders Start Drawing Salary?',plain:'At what month will founders start taking a salary (or increase current salary)?',why:'This is a step-function cost increase that many pro formas miss. Going from $0 to $80K/founder changes burn dramatically.',affects:'Monthly burn rate timeline, cash flow projections.',type:'select',options:['Already drawing full salary','After seed round closes','Month 6','Month 12','Month 18','After first $10K MRR','After profitability'],def:'After seed round closes',defSource:'Most common approach'},
      {q:69,label:'Target Founder Salary',plain:'What salary will founders draw once they start?',why:'Combined with timing, this shows when your real burn rate kicks in.',affects:'Executive compensation, burn rate after funding.',type:'currency',def:'$80,000',defSource:'Pre-Seed founder median (Kruze Consulting 2024)'},
      {q:33,label:'Engineering Hires (Year 1)',plain:'How many engineers will you hire in Year 1?',why:'Engineers are typically 60-70% of early headcount. Each one is $95-150K loaded cost.',affects:'Headcount tab, R&D expense, burn rate.',type:'number',def:'2',defSource:'Pre-Seed typical',required:true},
      {q:70,label:'Engineering Hires (Year 2)',plain:'How many additional engineers in Year 2?',why:'Year 2 scaling usually requires 2-3x the engineering team to handle growth, technical debt, and new features.',affects:'Year 2 headcount, R&D scaling costs.',type:'number',def:'3',defSource:'Post-Seed typical'},
      {q:71,label:'Non-Engineering Hires (Year 1)',plain:'How many non-engineering hires in Year 1? (Sales, marketing, ops, support)',why:'Support + ops needs scale with customers. Each non-eng hire is $65-100K loaded.',affects:'G&A and S&M expense, support capacity.',type:'number',def:'1',defSource:'Pre-Seed typical'},
      {q:72,label:'Non-Engineering Hires (Year 2)',plain:'How many additional non-engineering hires in Year 2?',why:'As customer count grows, you need support, account management, and sales capacity.',affects:'Year 2 headcount, scaling readiness.',type:'number',def:'3',defSource:'Post-Seed typical'},
      {q:34,label:'Average Engineering Salary',plain:'Average annual salary for engineering hires?',why:'Include base salary only. Benefits are calculated separately.',affects:'R&D expense line, loaded cost per engineer.',type:'currency',def:'$95,000',defSource:'BLS Software Dev median (2024)',required:true},
      {q:73,label:'Average Non-Engineering Salary',plain:'Average annual salary for sales/ops/support hires?',why:'Non-engineering roles are typically 20-30% lower than engineering.',affects:'G&A and S&M expense lines.',type:'currency',def:'$70,000',defSource:'BLS median (2024)'},
      {q:35,label:'Benefits Burden Rate',plain:'What % on top of salary for benefits/taxes? (FICA, health insurance, 401k, etc.)',why:'Real cost per employee = salary × (1 + burden rate). A $95K engineer actually costs $119K at 25% burden.',affects:'Total compensation calculations, true burn rate.',type:'number',def:'25',defSource:'Standard US rate'},
      {q:74,label:'Contractor / Freelancer Budget',plain:'Monthly budget for contractors and freelancers?',why:'Many startups use contractors before full-time hires. This is real spend that often gets missed.',affects:'Monthly burn rate, COGS or G&A depending on role.',type:'currency',def:'$2,000',defSource:'Early-stage typical'},
      {q:36,label:'Cloud Compute & Hosting',plain:'Monthly cloud hosting cost? (AWS, GCP, Azure)',why:'For AI SaaS, this scales with usage. $500/mo at launch can become $5,000/mo with 100 customers.',affects:'COGS, infrastructure costs.',type:'currency',def:'$500',defSource:'Early-stage AWS median',required:true},
      {q:75,label:'AI/ML API Costs',plain:'Monthly AI API costs? (OpenAI, Anthropic, Cohere, etc.)',why:'AI inference costs are the #1 margin killer for AI SaaS. $0.01/call × 1M calls = $10K/month.',affects:'COGS, gross margin, AI cost scaling.',type:'currency',def:'$300',defSource:'Early-stage AI SaaS median',required:true},
      {q:76,label:'Hosting Cost Growth',plain:'How will hosting costs scale with customers?',why:'Linear scaling (2x customers = 2x cost) is bad. Sub-linear scaling (2x customers = 1.3x cost) is good.',affects:'Year 2-5 COGS projections.',type:'select',options:['Linear — scales 1:1 with customers','Sub-linear — efficiency gains with scale','Step-function — jumps at thresholds (e.g., new server tiers)','Fixed — flat cost regardless of usage','Unsure'],def:'Sub-linear — efficiency gains with scale',defSource:'Well-architected SaaS'},
      {q:77,label:'Database & Storage',plain:'Monthly database and data storage costs?',why:'Separate from compute. Includes managed databases (RDS, Planetscale), data lakes, backups.',affects:'COGS, infrastructure.',type:'currency',def:'$100',defSource:'Early-stage typical'},
      {q:37,label:'Monthly Tools & Software',plain:'Monthly SaaS tools spend? (Slack, GitHub, Figma, monitoring, analytics, etc.)',why:'These add up fast. List what you use: $10/seat × 5 tools × 5 people = $250/mo just in seat licenses.',affects:'G&A expense.',type:'currency',def:'$300',defSource:'Early-stage median'},
      {q:38,label:'Workspace Costs',plain:'Monthly office/co-working cost? ($0 if fully remote)',why:'Remote = $0. Co-working = $200-500/person. Office lease = major fixed commitment.',affects:'G&A expense, fixed cost base.',type:'currency',def:'$0',defSource:'Remote-first default'},
      {q:78,label:'Insurance',plain:'Annual business insurance costs? (E&O, D&O, cyber, general liability)',why:'Often required by enterprise customers and investors. Typical startup package is $2-5K/year.',affects:'G&A expense, compliance readiness.',type:'currency',def:'$3,000',defSource:'Embroker startup package median'},
      {q:39,label:'Hardware & Equipment',plain:'Annual hardware costs? (Laptops for new hires, monitors, etc.)',why:'Budget ~$2,000-3,000 per new hire for equipment.',affects:'G&A expense, one-time costs per hire.',type:'currency',def:'$3,000'},
      {q:40,label:'Legal & Compliance',plain:'Annual legal costs? (Corporate, IP, contracts, compliance certs)',why:'Often underestimated. SOC 2 alone is $5-15K. Patent filing is $10-15K. Standard legal retainer is $3-5K.',affects:'G&A expense, compliance gate.',type:'currency',def:'$8,000',defSource:'Adjusted for SOC 2 + corporate'},
      {q:79,label:'Accounting & Finance',plain:'Annual accounting/bookkeeping costs?',why:'DIY works for a few months, but investors expect clean books. Fractional CFO + bookkeeper is $500-2,000/mo.',affects:'G&A expense.',type:'currency',def:'$6,000',defSource:'$500/mo bookkeeper baseline'},
      {q:80,label:'Unexpected Expense Buffer',plain:'What % buffer should we add for unexpected costs?',why:'Things always cost more than expected. 10-15% buffer is standard financial planning.',affects:'Total expense projections, runway accuracy.',type:'number',def:'10',defSource:'Standard financial planning buffer'},
    ]},
    { num:5, title:'Funding & Capitalization', desc:'Funding history and capital structure for investor return modeling.', time:7, questions:[
      {q:41,label:'Funding History',plain:'List your previous funding rounds.',why:'Builds complete capital history.',affects:'Funding tab, cap table.',type:'textarea',def:'No prior funding',required:true,charLimit:500},
      {q:42,label:'Current Valuation',plain:'Valuation of your last (or expected next) round?',why:'Baseline for investor return calculations.',affects:'Investor return analysis.',type:'currency',def:'$4,000,000',defSource:'Median Seed (PitchBook 2024)',required:true},
      {q:43,label:'Equity Split',plain:'Current equity split? (founders / investors / ESOP)',why:'Critical for cap table and dilution.',affects:'Cap table, equity dilution.',type:'textarea',def:'Founders: 85%, ESOP: 15%',defSource:'Pre-investment standard',required:true,charLimit:300},
      {q:44,label:'ESOP / Option Pool',plain:'What % reserved for employee stock options?',why:'Investors expect ESOP before investing.',affects:'Cap table, dilution.',type:'number',def:'10',defSource:'Standard pre-round size',required:true},
      {q:45,label:'Instrument Type',plain:'What type of instrument are you raising with?',why:'Affects valuation and terms.',affects:'Deal structure in memos.',type:'select',options:['SAFE (Post-Money)','SAFE (Pre-Money)','Convertible Note','Priced Equity Round','Revenue-Based Financing','Other'],def:'SAFE (Post-Money)',defSource:'Most common Seed (2024)',required:true},
      {q:46,label:'Target Valuation',plain:'Target post-money valuation for next round?',why:'Used for investor return modeling.',affects:'Investor return analysis.',type:'currency',def:'$6,000,000',defSource:'Median Seed (PitchBook 2024)',required:true},
      {q:47,label:'Use of Proceeds',plain:'How will you use the money you raise?',why:'Key section in memos.',affects:'Use of Proceeds section.',type:'textarea',def:'50% Product, 30% S&M, 20% Ops',defSource:'Standard Seed allocation (SaaStr)',required:true,charLimit:400},
      {q:48,label:'Exit Timeline',plain:'When do you envision a potential exit?',why:'Frames investment thesis.',affects:'Investor return analysis.',type:'select',options:['3-5 years','5-7 years','7-10 years','10+ years','No specific timeline'],def:'5-7 years',defSource:'Standard VC lifecycle'},
      {q:49,label:'Exit Type',plain:'What exit path do you envision?',why:'Influences return model.',affects:'Risk factors section.',type:'select',options:['Strategic Acquisition','IPO','PE Buyout','Merger','No Preference'],def:'Strategic Acquisition',defSource:'Most common SaaS exit'},
      {q:50,label:'Target Return Multiple',plain:'What return multiple is achievable for investors?',why:'Sets benchmark for return analysis.',affects:'Investor return model.',type:'select',options:['3x','5x','10x','20x+'],def:'10x',defSource:'Standard VC target'},
    ]},
    { num:6, title:'Vertical & Louisiana Incentives', desc:'Industry-specific questions and Louisiana economic incentives.', time:5, questions:[
      {q:51,label:'Regulatory Requirements',plain:'Any specific regulatory/compliance requirements?',why:'Affects cost structure and timeline.',affects:'Legal costs, risk factors.',type:'textarea',def:'Standard (SOC 2, GDPR)',defSource:'General SaaS baseline',charLimit:300},
      {q:52,label:'Industry-Specific Costs',plain:'Any unusual costs for your vertical?',why:'Ensures expense model captures everything.',affects:'Vertical-specific expenses.',type:'textarea',def:'None',charLimit:300},
      {q:53,label:'Louisiana Operations',plain:'Does your company operate in Louisiana?',why:'Activates Louisiana incentive calculations.',affects:'5 incentive program assessments.',type:'select',options:['Yes - Currently','Yes - Planning to','No'],def:'No',required:true},
      {q:54,label:'Digital Media Focus',plain:'Does your product create digital interactive media?',why:'Eligibility for LA Digital Media Tax Credit (25%).',affects:'Louisiana incentive calculation.',type:'select',options:['Yes','No','Partially'],def:'No'},
      {q:55,label:'Additional Notes',plain:'Anything else we should know?',why:'Catch-all for details that don\'t fit elsewhere.',affects:'Analyst review notes.',type:'textarea',charLimit:500},
    ]},
  ];

  var totalQuestions = MODULES.reduce(function(s,m){return s+m.questions.length;},0);

  // ─── Discovery Calculators ─────────────────
  // Probing sub-questions that help founders arrive at their actual number
  var PROBES = {
    '1_6': { // Team Size
      title: 'Let\'s count your team',
      fields: [
        {id:'p_founders',label:'Founders (full-time)',type:'number',def:1},
        {id:'p_ft_employees',label:'Full-time employees',type:'number',def:0},
        {id:'p_pt_employees',label:'Part-time / contractors (count as 0.5 each)',type:'number',def:0},
      ],
      calc: function(v){return (Number(v.p_founders)||0) + (Number(v.p_ft_employees)||0) + Math.round((Number(v.p_pt_employees)||0)*0.5);}
    },
    '1_9': { // Capital Raised
      title: 'Add up everything you\'ve raised',
      fields: [
        {id:'p_self_funded',label:'Personal savings invested ($)',type:'currency',def:0},
        {id:'p_friends_family',label:'Friends & family ($)',type:'currency',def:0},
        {id:'p_angel',label:'Angel investors ($)',type:'currency',def:0},
        {id:'p_grants',label:'Grants / competitions ($)',type:'currency',def:0},
        {id:'p_institutional',label:'Institutional (VC/fund) ($)',type:'currency',def:0},
      ],
      calc: function(v){return (Number(v.p_self_funded)||0)+(Number(v.p_friends_family)||0)+(Number(v.p_angel)||0)+(Number(v.p_grants)||0)+(Number(v.p_institutional)||0);},
      format:'$'
    },
    '1_10': { // Target Raise
      title: 'What do you need the money for?',
      fields: [
        {id:'p_hire',label:'How many people to hire? (avg $85K each)',type:'number',def:2},
        {id:'p_months_runway',label:'Months of runway needed?',type:'number',def:18},
        {id:'p_monthly_ops',label:'Monthly ops cost (hosting, tools, office) ($)',type:'currency',def:2000},
      ],
      calc: function(v){var hires=(Number(v.p_hire)||0)*85000;var ops=(Number(v.p_months_runway)||0)*(Number(v.p_monthly_ops)||0);return Math.round((hires+ops)/50000)*50000;},
      format:'$'
    },
    '2_14': { // Current MRR
      title: 'Let\'s calculate your MRR',
      fields: [
        {id:'p_paying_customers',label:'How many paying customers right now?',type:'number',def:0},
        {id:'p_avg_monthly_price',label:'What do they pay per month on average? ($)',type:'currency',def:0},
      ],
      calc: function(v){return (Number(v.p_paying_customers)||0)*(Number(v.p_avg_monthly_price)||0);},
      format:'$'
    },
    '2_56': { // First 6-Month Customers
      title: 'Think through your first customers',
      fields: [
        {id:'p_warm_leads',label:'People/companies already interested or in conversations?',type:'number',def:2},
        {id:'p_launch_converts',label:'Expected conversions from launch (Product Hunt, LinkedIn, etc.)?',type:'number',def:1},
        {id:'p_referral_month',label:'Referrals you\'d expect per month once live?',type:'number',def:0},
      ],
      calc: function(v){return (Number(v.p_warm_leads)||0)+(Number(v.p_launch_converts)||0)+(Number(v.p_referral_month)||0)*4;},
      hint:'Be honest — these are your first real customers. Where will they actually come from?'
    },
    '2_57': { // Year 1 Customers
      title: 'Build your Year 1 customer funnel',
      fields: [
        {id:'p_monthly_leads_y1',label:'Leads per month (website visits, demos, trials)?',type:'number',def:50},
        {id:'p_convert_rate_y1',label:'Conversion rate to paid (%)?',type:'number',def:3},
        {id:'p_months_selling_y1',label:'Months actively selling in Year 1?',type:'number',def:8},
      ],
      calc: function(v){var leads=Number(v.p_monthly_leads_y1)||50;var rate=(Number(v.p_convert_rate_y1)||3)/100;var months=Number(v.p_months_selling_y1)||8;return Math.round(leads*rate*months);},
      hint:'If you get 50 leads/month at 3% conversion for 8 months, that\'s 12 customers.'
    },
    '2_58': { // Year 2 Customers
      title: 'Project Year 2 growth',
      fields: [
        {id:'p_y1_end_custs',label:'Expected customers at end of Year 1?',type:'number',def:25},
        {id:'p_monthly_growth_y2',label:'Monthly customer growth rate in Year 2 (%)?',type:'number',def:10},
        {id:'p_churn_rate_y2',label:'Monthly churn rate (%)?',type:'number',def:5},
      ],
      calc: function(v){var custs=Number(v.p_y1_end_custs)||25;var growth=(Number(v.p_monthly_growth_y2)||10)/100;var churn=(Number(v.p_churn_rate_y2)||5)/100;for(var i=0;i<12;i++){custs=custs*(1+growth-churn);}return Math.round(custs);},
      hint:'Accounts for both new customer adds AND churn losses each month.'
    },
    '2_15': { // Gross Margin
      title: 'Estimate your gross margin',
      fields: [
        {id:'p_monthly_revenue',label:'Monthly revenue (or expected) ($)',type:'currency',def:10000},
        {id:'p_hosting_costs',label:'Monthly hosting / infrastructure ($)',type:'currency',def:1500},
        {id:'p_api_costs',label:'Monthly API / AI costs ($)',type:'currency',def:1000},
        {id:'p_support_costs',label:'Monthly customer support costs ($)',type:'currency',def:500},
      ],
      calc: function(v){var rev=Number(v.p_monthly_revenue)||1;var costs=(Number(v.p_hosting_costs)||0)+(Number(v.p_api_costs)||0)+(Number(v.p_support_costs)||0);return Math.round((rev-costs)/rev*100);},
      suffix:'%'
    },
    '2_16': { // MRR Growth Rate
      title: 'Think about your growth trajectory',
      fields: [
        {id:'p_mrr_2mo_ago',label:'MRR two months ago ($)',type:'currency',def:0},
        {id:'p_mrr_last_mo',label:'MRR last month ($)',type:'currency',def:0},
        {id:'p_mrr_this_mo',label:'MRR this month ($)',type:'currency',def:0},
      ],
      calc: function(v){var a=Number(v.p_mrr_2mo_ago)||0;var b=Number(v.p_mrr_last_mo)||0;var c=Number(v.p_mrr_this_mo)||0;if(a<=0||b<=0||c<=0)return 15;var g1=(b-a)/a*100;var g2=(c-b)/b*100;return Math.round((g1+g2)/2);},
      suffix:'%',
      hint:'If pre-revenue, think about how many customers you expect to add per month.'
    },
    '2_17': { // Monthly Churn
      title: 'Estimate your churn',
      fields: [
        {id:'p_customers_start',label:'Customers at start of last month',type:'number',def:0},
        {id:'p_customers_lost',label:'Customers lost / cancelled last month',type:'number',def:0},
      ],
      calc: function(v){var s=Number(v.p_customers_start)||1;var l=Number(v.p_customers_lost)||0;return Math.round(l/s*100);},
      suffix:'%',
      hint:'No customers yet? Industry average for early SaaS is 5-8%.'
    },
    '3_62': { // Monthly Marketing Budget
      title: 'Build your marketing budget',
      fields: [
        {id:'p_content_seo',label:'Content creation / SEO ($)',type:'currency',def:500},
        {id:'p_paid_ads',label:'Paid ads (Google, LinkedIn, Meta) ($)',type:'currency',def:500},
        {id:'p_community',label:'Community / events / sponsorships ($)',type:'currency',def:200},
        {id:'p_tools_mktg',label:'Marketing tools (email, analytics, CRM) ($)',type:'currency',def:200},
        {id:'p_design_video',label:'Design / video production ($)',type:'currency',def:100},
      ],
      calc: function(v){return (Number(v.p_content_seo)||0)+(Number(v.p_paid_ads)||0)+(Number(v.p_community)||0)+(Number(v.p_tools_mktg)||0)+(Number(v.p_design_video)||0);},
      format:'$',
      hint:'Early stage: $1-3K/mo is typical. Scale up as you validate which channels work.'
    },
    '3_63': { // Conversion Rate
      title: 'Estimate your conversion funnel',
      fields: [
        {id:'p_site_visitors',label:'Monthly website visitors expected?',type:'number',def:500},
        {id:'p_signups',label:'How many will sign up / request demo?',type:'number',def:25},
        {id:'p_activations',label:'How many will actually try the product?',type:'number',def:15},
        {id:'p_paid_converts',label:'How many will become paying customers?',type:'number',def:3},
      ],
      calc: function(v){var visitors=Number(v.p_site_visitors)||1;var paid=Number(v.p_paid_converts)||0;return Math.round(paid/visitors*1000)/10;},
      suffix:'%',
      hint:'Visitor → Signup (5%) → Activation (60%) → Paid (20%) = ~0.6% end-to-end is normal for PLG.'
    },
    '3_24': { // CAC
      title: 'Calculate your Customer Acquisition Cost',
      fields: [
        {id:'p_marketing_spend',label:'Total marketing + sales spend last 3 months ($)',type:'currency',def:0},
        {id:'p_new_customers_3mo',label:'New customers acquired in those 3 months',type:'number',def:0},
      ],
      calc: function(v){var spend=Number(v.p_marketing_spend)||0;var cust=Number(v.p_new_customers_3mo)||1;if(spend===0&&cust===0)return 200;return Math.round(spend/cust);},
      format:'$',
      hint:'No sales data yet? Think about what you\'d spend to get your first 10 customers.'
    },
    '3_25': { // ACV
      title: 'What\'s a customer worth per year?',
      fields: [
        {id:'p_monthly_price',label:'Monthly subscription price ($)',type:'currency',def:99},
        {id:'p_annual_discount',label:'Annual plan discount (%)',type:'number',def:15},
        {id:'p_pct_annual',label:'What % of customers will choose annual? (%)',type:'number',def:40},
      ],

  // ─── Utilities ───────────────────────────────
  function toast(msg,type){var t=document.createElement('div');t.className='toast toast-'+(type||'success');t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3500);}
  function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
  function fmt$(n,compact){n=Number(n)||0;if(compact){if(Math.abs(n)>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return'$'+n.toFixed(0);}return'$'+n.toLocaleString();}
  function fmtPct(n){return(Number(n)||0).toFixed(1)+'%';}
  function getAnswered(){return Object.keys(state.responses).filter(function(k){return state.responses[k]&&state.responses[k].trim();}).length;}

  // ─── Router ──────────────────────────────────
  function route(){
    var hash=location.hash.replace('#','')||'start';
    var parts=hash.split('/');
    if(parts[0]==='admin')renderAdmin();
    else if(parts[0]==='report')renderReport(parts[1]);
    else if(parts[0]==='intake'&&state.founder_id)renderIntake();
    else if(parts[0]==='dashboard'&&state.founder_id)renderDashboard();
    else renderStart();
    updateNav(parts[0]);
  }
  window.addEventListener('hashchange',route);

  function updateNav(page){
    var links=[{id:'start',label:'Start'},{id:'intake',label:'Discovery'},{id:'dashboard',label:'Dashboard'},{id:'report',label:'Report'}];
    nav.innerHTML=links.map(function(l){return'<a href="#'+l.id+'" class="'+(page===l.id?'active':'')+'"'+(l.id!=='start'&&!state.founder_id?' style="opacity:0.3;pointer-events:none"':'')+'>'+l.label+'</a>';}).join('');
  }

  // ─── Start / Registration ───────────────────
  function renderStart(){
    app.innerHTML='<div class="card card-dark" style="text-align:center;padding:2.5rem;"><h2 style="font-size:1.8rem;font-weight:300;margin-bottom:0.25rem;letter-spacing:-0.02em;">AI SaaS Founder Pro Forma</h2><p class="tagline" style="color:var(--gold-light);font-size:0.95rem;margin-bottom:0.5rem;">Laissez les bons temps coder!</p><p style="color:var(--cypress-mist);font-size:0.85rem;">Discovery, data collection & investor-ready financial model generation.</p><p class="mono" style="color:var(--pale-clay);margin-top:0.5rem;">55 questions · 6 modules · ~40 minutes · Industry benchmarks auto-fill gaps</p></div><div class="card card-accent"><h2>Get Started</h2><p class="text-muted" style="margin-bottom:1.25rem;">Enter your details to begin or resume your discovery intake.</p><div style="max-width:400px;"><label class="input-label">Full Name *</label><input type="text" id="sName" class="input" style="margin-bottom:0.75rem;"><label class="input-label">Email *</label><input type="email" id="sEmail" class="input" style="margin-bottom:0.75rem;"><label class="input-label">Company Name *</label><input type="text" id="sCompany" class="input" style="margin-bottom:1.25rem;"><button class="btn btn-dark" id="startBtn" style="width:100%;">Begin Discovery →</button><p id="startError" style="color:var(--brick-red);font-size:0.85rem;margin-top:0.75rem;"></p></div></div><div class="card"><h3 style="margin-top:0;font-family:\'Barlow Semi Condensed\',sans-serif;font-size:1.1rem;">How It Works</h3><div class="metric-grid" style="margin-top:0.75rem;"><div class="metric"><div class="metric-val text-gold">1</div><div class="metric-label">Answer Questions</div><p style="font-size:0.8rem;margin-top:0.25rem;">55 guided questions with context</p></div><div class="metric"><div class="metric-val text-gold">2</div><div class="metric-label">Skip with Defaults</div><p style="font-size:0.8rem;margin-top:0.25rem;">Industry benchmarks fill the gaps</p></div><div class="metric"><div class="metric-val text-gold">3</div><div class="metric-label">Get Your Model</div><p style="font-size:0.8rem;margin-top:0.25rem;">5-year P&L, unit economics, Finance Score</p></div></div></div>';
    document.getElementById('startBtn').addEventListener('click',function(){
      var name=document.getElementById('sName').value.trim();
      var email=document.getElementById('sEmail').value.trim();
      var company=document.getElementById('sCompany').value.trim();
      if(!name||!email||!company){document.getElementById('startError').textContent='All fields required.';return;}
      this.disabled=true;this.textContent='Starting...';
      fetch(API+'/api/founders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,name:name,company_name:company})})
      .then(function(r){return r.json();}).then(function(d){
        if(d.success){state.founder_id=d.founder_id;state.email=email;
          state.responses['1_1']=company;
          state.currentModule=1;state.currentQ=1;
          // Save company name in background, don't wait
          saveResponse('1_1',company);
          // Load existing responses in background for returning users
          if(d.existing){
            fetch(API+'/api/responses/'+d.founder_id).then(function(r){return r.json();}).then(function(rd){
              Object.keys(rd.responses||{}).forEach(function(k){state.responses[k]=rd.responses[k].value;});
            }).catch(function(){});
          }
          // Navigate immediately — force render even if hash unchanged
          location.hash='intake';
          route();
        }else{document.getElementById('startError').textContent=d.error||'Error';document.getElementById('startBtn').disabled=false;document.getElementById('startBtn').textContent='Begin Discovery →';}
      }).catch(function(e){document.getElementById('startError').textContent=e.message;document.getElementById('startBtn').disabled=false;document.getElementById('startBtn').textContent='Begin Discovery →';});
    });
    document.getElementById('sCompany').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('startBtn').click();});
  }

  // ─── Guided Intake ──────────────────────────
  function renderIntake(){
    var mod=MODULES[state.currentModule-1];
    var q=mod.questions[state.currentQ];
    var answered=getAnswered();
    var pct=Math.round(answered/totalQuestions*100);
    var key=mod.num+'_'+q.q;
    var curVal=state.responses[key]||'';

    var h='';
    h+='<div class="card" style="padding:1rem 1.25rem;"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;"><div><span class="mono text-muted">Module '+mod.num+'/'+MODULES.length+'</span><strong style="margin-left:0.5rem;font-family:\'Barlow Semi Condensed\',sans-serif;letter-spacing:0.02em;">'+esc(mod.title)+'</strong></div><div class="mono text-muted">~'+mod.time+' min · Q'+(state.currentQ+1)+'/'+mod.questions.length+'</div></div><p style="font-size:0.85rem;color:var(--muted);margin:0.5rem 0 0;">'+esc(mod.desc)+'</p></div>';

    h+='<div style="margin-bottom:0.5rem;"><div style="display:flex;justify-content:space-between;align-items:center;" class="mono text-muted"><span>'+answered+'/'+totalQuestions+' answered</span><button onclick="document.getElementById(\'glossaryFab\').click();" class="btn btn-outline btn-sm" style="font-size:0.7rem;padding:0.2rem 0.6rem;border-color:var(--ocher-gold);color:var(--ocher-gold);">📖 Terms & Definitions</button><span>'+pct+'%</span></div><div class="progress"><div class="progress-fill" style="width:'+pct+'%;background:var(--ocher-gold);"></div></div></div>';

    h+='<div class="module-pills">';
    MODULES.forEach(function(m){
      var mAns=0;m.questions.forEach(function(mq){if(state.responses[m.num+'_'+mq.q])mAns++;});
      var isCur=m.num===state.currentModule;var isDone=mAns===m.questions.length;
      h+='<div class="module-pill'+(isCur?' active':'')+(isDone?' complete':'')+'" data-mod="'+m.num+'">'+m.num+(isDone?' ✓':'')+'</div>';
    });
    h+='</div>';

    h+='<div class="card card-accent" style="padding:1.75rem;">';
    if(q.why)h+='<div class="tip tip-why"><span class="tip-label">Why we ask</span>'+esc(q.why)+'</div>';
    h+='<h2 style="font-size:1.15rem;margin-bottom:0.25rem;">'+esc(q.plain)+'</h2>';
    h+='<p class="mono text-muted" style="margin-bottom:1rem;">'+esc(q.label)+(q.required?' <span style="color:var(--brick-red);">*</span>':'')+'</p>';
    if(q.affects)h+='<div class="tip tip-affects"><span class="tip-label">What this affects</span>'+esc(q.affects)+'</div>';

    if(q.type==='select'){
      h+='<select class="input" id="qInput"><option value="">Select...</option>';
      (q.options||[]).forEach(function(o){h+='<option value="'+esc(o)+'"'+(curVal===o?' selected':'')+'>'+esc(o)+'</option>';});
      h+='</select>';
    }else if(q.type==='textarea'){
      h+='<textarea class="input" id="qInput" maxlength="'+(q.charLimit||500)+'" placeholder="'+esc(q.plain)+'">'+esc(curVal)+'</textarea>';
      if(q.charLimit)h+='<div class="mono text-muted" style="text-align:right;margin-top:0.25rem;" id="charCount">'+(curVal.length||0)+'/'+q.charLimit+'</div>';
    }else if(q.type==='currency'){
      h+='<div class="input-currency"><span>$</span><input type="text" class="input" id="qInput" value="'+esc(curVal.replace(/^\$/,''))+'" placeholder="e.g. 500,000"></div>';
    }else if(q.type==='number'){
      h+='<input type="number" class="input" id="qInput" value="'+esc(curVal)+'" placeholder="'+esc(q.def||'')+'" style="max-width:200px;">';
    }else{
      h+='<input type="text" class="input" id="qInput" value="'+esc(curVal)+'" placeholder="'+esc(q.def||'')+'">';
    }
    h+='</div>';

    // Discovery calculator probe
    var probe=PROBES[key];
    if(probe){
      h+='<div style="margin-bottom:0.75rem;"><button class="btn btn-outline btn-sm" id="probeToggle" style="width:100%;justify-content:center;gap:0.5rem;">🧮 Help me figure this out</button>';
      h+='<div id="probePanel" class="hidden" style="margin-top:0.75rem;padding:1.25rem;border:1px solid var(--pale-clay);border-radius:8px;background:rgba(253,244,226,0.3);">';
      h+='<h3 style="margin-top:0;font-size:0.95rem;color:var(--deep-black);">'+esc(probe.title)+'</h3>';
      if(probe.hint)h+='<p style="font-size:0.8rem;color:var(--marsh-olive);margin-bottom:0.75rem;font-style:italic;">'+esc(probe.hint)+'</p>';
      probe.fields.forEach(function(f){
        h+='<div style="margin-bottom:0.6rem;"><label class="input-label" style="font-size:0.7rem;">'+esc(f.label)+'</label>';
        if(f.type==='currency'){
          h+='<div class="input-currency"><span>$</span><input type="number" class="input probe-field" id="'+f.id+'" value="'+(f.def||0)+'" style="max-width:220px;"></div>';
        }else{
          h+='<input type="number" class="input probe-field" id="'+f.id+'" value="'+(f.def||0)+'" style="max-width:180px;">';
        }
        h+='</div>';
      });
      h+='<div style="display:flex;align-items:center;gap:1rem;margin-top:1rem;padding-top:0.75rem;border-top:1px solid var(--pale-clay);"><div><span class="mono text-muted" style="font-size:0.65rem;text-transform:uppercase;">Calculated Answer</span><div id="probeResult" style="font-size:1.5rem;font-weight:700;color:var(--ocher-gold);font-family:\'Barlow Semi Condensed\',sans-serif;">—</div></div><button class="btn btn-gold btn-sm" id="probeUseBtn">Use This Answer</button></div>';
      h+='</div></div>';
    }

    if(q.def){
      h+='<div class="skip-box"><div><p style="font-size:0.85rem;font-weight:500;margin:0;">Skip this question?</p><p class="mono text-muted" style="margin:0.15rem 0 0;font-size:0.75rem;">Benchmark: <strong>'+esc(q.def)+'</strong>'+(q.defSource?' — '+esc(q.defSource):'')+'</p></div><button class="btn btn-outline btn-sm" id="skipBtn">Use Default</button></div>';
    }

    if(curVal)h+='<div class="mono text-green" style="font-size:0.75rem;margin-bottom:0.75rem;">✓ Saved</div>';

    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.5rem;"><button class="btn btn-outline" id="prevBtn"'+(state.currentModule===1&&state.currentQ===0?' disabled':'')+'>← Previous</button><span class="mono text-muted no-print" style="font-size:0.75rem;">Auto-saved</span><button class="btn btn-dark" id="nextBtn">'+(state.currentModule===MODULES.length&&state.currentQ===mod.questions.length-1?'Generate Model →':'Next →')+'</button></div>';

    app.innerHTML=h;

    app.querySelectorAll('.module-pill').forEach(function(pill){
      pill.addEventListener('click',function(){state.currentModule=parseInt(this.dataset.mod);state.currentQ=0;renderIntake();});
    });

    var inp=document.getElementById('qInput');
    if(inp&&q.charLimit){inp.addEventListener('input',function(){var el=document.getElementById('charCount');if(el)el.textContent=this.value.length+'/'+q.charLimit;});}

    var saveTimer=null;
    if(inp){inp.addEventListener('input',function(){
      clearTimeout(saveTimer);var val=this.value;
      saveTimer=setTimeout(function(){saveResponse(key,val);},1200);
    });
    inp.addEventListener('change',function(){clearTimeout(saveTimer);saveResponse(key,this.value);});}

    var prevBtn=document.getElementById('prevBtn');
    if(prevBtn){prevBtn.addEventListener('click',function(){
      // Save current before navigating
      if(inp&&inp.value.trim())saveResponse(key,inp.value.trim());
      if(state.currentQ>0){state.currentQ--;}else if(state.currentModule>1){state.currentModule--;state.currentQ=MODULES[state.currentModule-1].questions.length-1;}
      renderIntake();
    });}

    var nextBtn=document.getElementById('nextBtn');
    if(nextBtn){nextBtn.addEventListener('click',function(){
      var val=(inp?inp.value:'').trim();
      if(q.required&&!val&&!state.responses[key]){toast('This question is required.','error');return;}
      if(val)saveResponse(key,val);
      if(state.currentQ<mod.questions.length-1){state.currentQ++;}
      else if(state.currentModule<MODULES.length){state.currentModule++;state.currentQ=0;}
      else{generateModel();return;}
      renderIntake();
    });}

    var skipBtn=document.getElementById('skipBtn');
    if(skipBtn){skipBtn.addEventListener('click',function(){
      saveResponse(key,q.def,'skipped_default');
      if(state.currentQ<mod.questions.length-1){state.currentQ++;}
      else if(state.currentModule<MODULES.length){state.currentModule++;state.currentQ=0;}
      else{generateModel();return;}
      renderIntake();
    });}

    // Probe calculator listeners
    var probeToggle=document.getElementById('probeToggle');
    if(probeToggle&&probe){
      probeToggle.addEventListener('click',function(){
        var panel=document.getElementById('probePanel');
        if(panel.classList.contains('hidden')){panel.classList.remove('hidden');this.textContent='▲ Close calculator';calcProbe();}
        else{panel.classList.add('hidden');this.textContent='🧮 Help me figure this out';}
      });
      function calcProbe(){
        var vals={};
        probe.fields.forEach(function(f){var el=document.getElementById(f.id);if(el)vals[f.id]=el.value;});
        var result=probe.calc(vals);
        var display=probe.format==='$'?'$'+Number(result).toLocaleString():result+(probe.suffix||'');
        var el=document.getElementById('probeResult');if(el)el.textContent=display;
      }
      document.querySelectorAll('.probe-field').forEach(function(pf){
        pf.addEventListener('input',calcProbe);
      });
      var probeUseBtn=document.getElementById('probeUseBtn');
      if(probeUseBtn){probeUseBtn.addEventListener('click',function(){
        var vals={};
        probe.fields.forEach(function(f){var el=document.getElementById(f.id);if(el)vals[f.id]=el.value;});
        var result=probe.calc(vals);
        var mainInput=document.getElementById('qInput');
        if(mainInput){mainInput.value=result;saveResponse(key,String(result));}
        document.getElementById('probePanel').classList.add('hidden');
        probeToggle.textContent='🧮 Help me figure this out';
        toast('Answer calculated and saved!','success');
      });}
    }

    if(inp)inp.focus();
  }

  function saveResponse(key,value,type){
    state.responses[key]=value;
    var parts=key.split('_');
    fetch(API+'/api/responses',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      founder_id:state.founder_id,module_number:parseInt(parts[0]),question_number:parseInt(parts[1]),response_value:value,response_type:type||'founder_provided'
    })}).catch(function(){});
  }

        h+='<div class="card"><h3 style="margin-top:0;">All Founders ('+founders.length+')</h3>';
        if(founders.length){
          h+='<div style="overflow-x:auto;"><table class="tbl"><thead><tr><th>Company</th><th>Founder</th><th>Phase</th><th style="text-align:center;">Answers</th><th style="text-align:center;">Score</th><th>Date</th></tr></thead><tbody>';
          founders.forEach(function(f){
            h+='<tr><td>'+esc(f.company_name)+'</td><td>'+esc(f.name)+'</td><td>'+esc(f.phase)+'</td><td style="text-align:center;">'+f.answers_count+'/55</td><td style="text-align:center;">'+(f.latest_score?f.latest_score+'/5':'—')+'</td><td>'+new Date(f.created_at).toLocaleDateString()+'</td></tr>';
          });
          h+='</tbody></table></div>';
        }else{h+='<p class="text-muted" style="text-align:center;padding:2rem;">No founders yet.</p>';}
        h+='</div>';
        app.innerHTML=h;
      });
    }).catch(function(e){if(e.message!=='auth')app.innerHTML='<div class="card"><p class="text-danger">'+e.message+'</p></div>';});
  }

  function renderAdminLogin(){
    app.innerHTML='<div style="max-width:380px;margin:3rem auto;"><div class="card card-accent"><h2>Admin Login</h2><label class="input-label">Email</label><input type="email" id="aEmail" class="input" style="margin-bottom:0.75rem;"><label class="input-label">Password</label><input type="password" id="aPass" class="input" style="margin-bottom:1rem;"><button class="btn btn-dark" id="aLoginBtn" style="width:100%;">Login</button><p id="aError" style="color:var(--brick-red);text-align:center;margin-top:0.75rem;font-size:0.85rem;"></p></div></div>';
    document.getElementById('aLoginBtn').addEventListener('click',function(){
      fetch(API+'/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('aEmail').value,password:document.getElementById('aPass').value})})
      .then(function(r){return r.json();}).then(function(d){if(d.success){sessionStorage.setItem('sbh_admin_token',d.token);renderAdmin();}else{document.getElementById('aError').textContent=d.error||'Invalid';}});
    });
    document.getElementById('aPass').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('aLoginBtn').click();});
  }

  // ─── Glossary ──────────────────────────────
  var GLOSSARY={
    'MRR':'Monthly Recurring Revenue — the predictable income your business earns every month from subscriptions.',
    'ARR':'Annual Recurring Revenue — your MRR multiplied by 12. Shows how much you\'d earn in a year at the current rate.',
    'TAM':'Total Addressable Market — the total amount of money that could be spent on products like yours if everyone who could buy it did.',
    'SAM':'Serviceable Addressable Market — the portion of TAM that your company can realistically reach.',
    'SOM':'Serviceable Obtainable Market — the realistic share of SAM you can capture in the near term.',
    'CAC':'Customer Acquisition Cost — how much money it costs you to get one new paying customer.',
    'LTV':'Lifetime Value — the total amount of money a customer will pay you during their entire time as a customer.',
    'LTV/CAC':'Lifetime Value to Customer Acquisition Cost ratio — shows how much revenue you earn for every dollar spent acquiring a customer. 3:1 or higher is considered healthy.',
    'ACV':'Annual Contract Value — the average yearly amount a single customer pays you.',
    'ARPU':'Average Revenue Per User — total revenue divided by number of users.',
    'NRR':'Net Revenue Retention — measures whether your existing customers are spending more or less over time. Over 100% means customers are growing.',
    'Churn':'The percentage of customers who cancel or stop paying in a given period.',
    'Gross Margin':'The percentage of revenue left after subtracting the direct costs of delivering your product (like hosting, support, and AI compute).',
    'Burn Rate':'How much money your company spends per month beyond what it earns.',
    'Runway':'How many months your company can keep operating at the current spending rate before running out of money.',
    'GTM':'Go-to-Market — your strategy for reaching and selling to customers.',
    'PLG':'Product-Led Growth — a strategy where the product itself drives customer acquisition (e.g., free trials, freemium).',
    'SaaS':'Software as a Service — a business model where customers pay a recurring subscription to use your software.',
    'B2B':'Business-to-Business — selling to other companies rather than individual consumers.',
    'B2C':'Business-to-Consumer — selling directly to individual consumers.',
    'B2B2C':'Business-to-Business-to-Consumer — selling to businesses who then serve consumers with your product.',
    'SAFE':'Simple Agreement for Future Equity — a popular early-stage investment document where an investor gives money now in exchange for equity later.',
    'ESOP':'Employee Stock Option Pool — shares set aside for employees as part of their compensation.',
    'Cap Table':'Capitalization Table — a spreadsheet showing who owns what percentage of your company.',
    'P&L':'Profit & Loss statement — a financial document showing your revenue, costs, and resulting profit or loss.',
    'COGS':'Cost of Goods Sold — the direct costs of delivering your product to customers.',
    'G&A':'General & Administrative — overhead costs like rent, utilities, legal, and accounting.',
    'S&M':'Sales & Marketing — costs related to acquiring and retaining customers.',
    'R&D':'Research & Development — costs related to building and improving your product.',
    'Unit Economics':'The revenue and costs associated with a single customer. Shows whether each new customer is profitable.',
    'Payback Period':'How many months it takes for a customer\'s payments to cover the cost of acquiring them.',
    'Valuation':'What your company is worth. "Pre-money" is the value before new investment, "post-money" includes the new investment.',
    'Dilution':'The reduction in existing shareholders\' ownership percentage when new shares are issued to investors.',
    'SOC 2':'A security certification that proves your company handles customer data safely.',
    'HIPAA':'Health Insurance Portability and Accountability Act — U.S. law requiring protection of patient health data.',
    'Pre-Money':'The valuation of your company before receiving new investment.',
    'Post-Money':'The valuation of your company after receiving new investment (pre-money + investment amount).',
    'Convertible Note':'A loan that converts to equity at a future financing round, usually with a discount or valuation cap.',
    'Revenue Multiple':'A way to value a company by multiplying its annual revenue by a number (e.g., 10x revenue).',
    'Break-Even':'The point where your revenue equals your expenses — you\'re no longer losing money.',
    'EBITDA':'Earnings Before Interest, Taxes, Depreciation and Amortization — a measure of operating profitability.'
  };
  var glossaryTerms=Object.keys(GLOSSARY).sort();

  // Build glossary UI
  var glossaryEl=document.createElement('div');
  glossaryEl.innerHTML='<button class="glossary-fab" id="glossaryFab" title="Financial Terms Glossary" style="font-size:1.5rem;line-height:1;">📖</button>'
    +'<div class="glossary-panel hidden" id="glossaryPanel">'
    +'<div class="glossary-header"><h3>📖 Financial Terms Glossary</h3><button style="background:none;border:none;color:var(--warm-cream);font-size:1.2rem;cursor:pointer;" id="glossaryClose">✕</button></div>'
    +'<div class="glossary-search"><input type="text" id="glossarySearch" placeholder="Search terms..."></div>'
    +'<div class="glossary-list" id="glossaryList"></div>'
    +'</div>';
  document.body.appendChild(glossaryEl);

  function renderGlossary(filter){
    var list=document.getElementById('glossaryList');
    var f=(filter||'').toLowerCase();
    var h='';
    glossaryTerms.forEach(function(term){
      if(f&&term.toLowerCase().indexOf(f)===-1&&GLOSSARY[term].toLowerCase().indexOf(f)===-1)return;
      h+='<div class="glossary-item"><div class="glossary-term">'+esc(term)+'</div><div class="glossary-def">'+esc(GLOSSARY[term])+'</div></div>';
    });
    if(!h)h='<div style="padding:1.25rem;text-align:center;color:var(--cypress-mist);font-size:0.85rem;">No matching terms found.</div>';
    list.innerHTML=h;
  }

  document.getElementById('glossaryFab').addEventListener('click',function(){
    var panel=document.getElementById('glossaryPanel');
    if(panel.classList.contains('hidden')){
      panel.classList.remove('hidden');
      renderGlossary();
      document.getElementById('glossarySearch').focus();
    }else{panel.classList.add('hidden');}
  });
  document.getElementById('glossaryClose').addEventListener('click',function(){
    document.getElementById('glossaryPanel').classList.add('hidden');
  });
  document.getElementById('glossarySearch').addEventListener('input',function(){
    renderGlossary(this.value);
  });

  // Auto-highlight relevant terms on each question
  function highlightGlossaryTerms(){
    var panel=document.getElementById('glossaryPanel');
    if(panel.classList.contains('hidden'))return;
    // Find terms mentioned in current question
    var questionText=(document.querySelector('.card-accent h2')||{}).textContent||'';
    var items=document.querySelectorAll('.glossary-item');
    items.forEach(function(item){
      var term=item.querySelector('.glossary-term').textContent;
      if(questionText.toLowerCase().indexOf(term.toLowerCase())>-1){
        item.classList.add('glossary-highlight');
      }else{item.classList.remove('glossary-highlight');}
    });
  }

  // Hook into renderIntake to auto-highlight
  var _origRenderIntake=renderIntake;
  renderIntake=function(){_origRenderIntake();setTimeout(highlightGlossaryTerms,100);};

  route();
})();
</script>
</body>
</html>
